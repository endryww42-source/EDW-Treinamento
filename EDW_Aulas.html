<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDW Treinamentos</title>
  
  <!-- Carregando Tailwind CSS para o visual -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Carregando FontAwesome para os ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Carregando React e ReactDOM (Versão para navegador) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Carregando Babel para traduzir o código JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Ajustes finos de barra de rolagem */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #303030; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-[#0f0f0f] text-white">

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect } = React;

    // --- CONFIGURAÇÃO DO FIREBASE ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "COLE_AQUI_SUA_API_KEY",
      authDomain: "SEU_PROJETO.firebaseapp.com",
      projectId: "SEU_PROJETO",
      storageBucket: "SEU_PROJETO.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef"
    };

    let app, auth, db, appId = firebaseConfig.projectId || 'default-app-id';
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.warn("Banco de dados não configurado.", e);
    }

    const CATEGORIES = ["Todos os Treinamentos", "Digitação", "FGTS", "Aumento de Margem", "Portabilidade", "Sistemas", "Ferramentas"];

    // --- DADOS DOS VÍDEOS ---
    const VIDEOS = [
      {
        id: 1, title: "Aula FGTS V8", author: "Treinamento EDW", category: "FGTS", 
        duration: "04:52",
        thumb: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80",
        localVideo: "./assets/Aula FGTS V8.mp4", 
        driveId: "1LvZ5VGF9NH7gUYrgcIFWNIb7Bx8BHjS8"
      },
      {
        id: 2, title: "Como Filtrar Dados das planilhas bagunçadas da V8", author: "Treinamento EDW", category: "Sistemas", 
        duration: "12:13",
        thumb: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80",
        localVideo: "./assets/Como Filtrar Dados das planilhas bagunçadas da V8.mp4",
        driveId: "19vRifEQXqrElPpAAdbJixIB0zvpum0Kn",
        materialLink: "https://drive.google.com/file/d/1I68FooitfUmK8HRK2MGd54oxJtZ4TgrQ/view?usp=drive_link"
      },
      {
        id: 3, title: "Colocar Extensão manual", author: "Treinamento EDW", category: "Ferramentas", 
        duration: "08:59",
        thumb: "./assets/img/colocar_extensao_manual.png",
        localVideo: "./assets/Colocar Extensão manual.mp4",
        driveId: "19lnhQSdCZoo0Uo0S3fx9l7mjlVp8E162",
        materialLink: "https://drive.google.com/file/d/1zrQnlIr7NTBVQJVe8487aIAZiSnMsUv9/view?usp=drive_link"
      },
      {
        id: 4, title: "Digitação BMG Aumento de Margem", author: "Treinamento EDW", category: "Aumento de Margem", 
        duration: "04:45",
        thumb: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80",
        localVideo: "./assets/Digitação BMG Aumento de Margem.mp4",
        driveId: "1eoayq9v-zoyOkHnSNlSaJWAVpRAoI7-Q"
      },
      {
        id: 5, title: "Digitação BMG Aumento de Margem1 (Parte 2)", author: "Treinamento EDW", category: "Aumento de Margem", 
        duration: "04:45",
        thumb: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80",
        localVideo: "./assets/Digitação BMG Aumento de Margem1.mp4",
        driveId: "1OYVoPUG0BZLjPQlSDAEG5qYeb2RgeVIW"
      },
      {
        id: 6, title: "Digitação BRB", author: "Treinamento EDW", category: "Digitação", 
        duration: "01:56",
        thumb: "https://images.unsplash.com/photo-1601597111158-2fceff292cdc?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80",
        localVideo: "./assets/Digitação BRB.mp4",
        driveId: "1XrpG2BMqQyNVm0wJH4skHr7QESL9MFjS"
      },
      {
        id: 7, title: "Digitação FACTA Aumento de margem INSS", author: "Treinamento EDW", category: "Aumento de Margem", 
        duration: "08:53",
        thumb: "https://images.unsplash.com/photo-1556740714-a8395b3bf30f?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80",
        localVideo: "./assets/Digitação FACTA Aumento de margem INSS.mp4",
        driveId: "1v8H4RBaj2NDvrXQJbNZWhavhF_ODfN2_"
      },
      {
        id: 8, title: "Digitação FGTS Facta Financeira", author: "Treinamento EDW", category: "FGTS", 
        duration: "06:23",
        thumb: "https://images.unsplash.com/photo-1579621970588-a35d0e7ab9b6?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80",
        localVideo: "./assets/Digitação FGTS Facta Financeira.mp4",
        driveId: "1Wb3_b0P4P9EM_jtwGg3R6oug6EBDpVDY"
      },
      {
        id: 9, title: "Digitação Novo 360bank", author: "Treinamento EDW", category: "Digitação", 
        duration: "03:20",
        thumb: "https://images.unsplash.com/photo-1616803140344-6682afb13cda?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80",
        localVideo: "./assets/Digitação Novo 360bank.mp4",
        driveId: "1-2XcPk0ZZrjOcF16GMN5Oj_BCmVlEv9-"
      },
      {
        id: 10, title: "Digitação Portabilidade (REP LE) Facta Financeira", author: "Treinamento EDW", category: "Portabilidade", 
        duration: "07:25",
        thumb: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80",
        localVideo: "./assets/Digitação Portabilidade (REP LE) Facta Financeira.mp4",
        driveId: "1j8Ai53hbtzJIG_Zy_5e9PoC8rN9Fj82n"
      },
      {
        id: 11, title: "Usar as ferramentas de disparo whatsapp", author: "Treinamento EDW", category: "Ferramentas", 
        duration: "05:43",
        thumb: "https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80",
        localVideo: "./assets/Usar as ferramentas de disparo whatsapp.mp4",
        driveId: "1pd2PyBNanGWoLCIiRb3Px_WjTw8FR2RX"
      }
    ];

    function formatViews(views) {
      if (!views) return "0 visualizações";
      if (views === 1) return "1 visualização";
      if (views >= 1000) return (views / 1000).toFixed(1).replace('.', ',') + " mil visualizações";
      return views + " visualizações";
    }

    function SidebarItem({ iconClass, label, active, isOpen, isSubItem = false }) {
      if (!isOpen) return null;
      return (
        <div className={`flex items-center px-3 py-2.5 mx-2 rounded-lg cursor-pointer transition-colors ${
          active ? 'bg-blue-600/10 text-blue-400 font-medium' : 'hover:bg-[#272727] text-gray-300'
        } ${isSubItem ? 'mt-1' : 'mb-1'}`}>
          <div className={`mr-3 w-5 text-center ${active ? 'text-blue-400' : 'text-gray-400'}`}>
            <i className={iconClass}></i>
          </div>
          <span className={`text-sm truncate flex-1 ${isSubItem ? 'text-[13px]' : ''}`}>{label}</span>
        </div>
      );
    }

    function VideoCard({ video, viewCount }) {
      return (
        <div className="flex flex-col cursor-pointer group h-full">
          <div className="relative w-full aspect-video rounded-xl overflow-hidden mb-3 border border-[#303030] bg-[#1a1a1a]">
            <img src={video.thumb} alt={video.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300 opacity-90 group-hover:opacity-100" />
            <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors"></div>
            <div className="absolute bottom-1.5 right-1.5 bg-black/80 text-white text-xs font-medium px-1.5 py-0.5 rounded backdrop-blur-sm">
              {video.duration}
            </div>
            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
              <div className="w-12 h-12 bg-blue-600/90 rounded-full flex items-center justify-center backdrop-blur-md shadow-lg">
                <i className="fa-solid fa-play text-white ml-1 text-lg"></i>
              </div>
            </div>
          </div>
          <div className="flex flex-col px-1">
            <h3 className="text-gray-100 text-[15px] font-semibold line-clamp-2 leading-snug group-hover:text-blue-400 transition-colors" title={video.title}>
              {video.title}
            </h3>
            <div className="text-gray-400 text-sm mt-1.5 flex items-center gap-2">
              <span className="bg-[#222] px-2 py-0.5 rounded text-xs border border-[#333]">{video.category}</span>
              <span className="text-xs">• {formatViews(viewCount)}</span>
            </div>
          </div>
        </div>
      );
    }

    function EDWTreinamentos() {
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [activeCategory, setActiveCategory] = useState("Todos os Treinamentos");
      const [currentView, setCurrentView] = useState("home"); // 'home', 'video', 'admin'
      const [currentVideo, setCurrentVideo] = useState(null);
      const [videoSource, setVideoSource] = useState('drive'); // Estado do seletor Local / Drive
      const [searchQuery, setSearchQuery] = useState("");
      
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [viewCounts, setViewCounts] = useState({});
      
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authMode, setAuthMode] = useState('login');
      const [authEmail, setAuthEmail] = useState("");
      const [authPassword, setAuthPassword] = useState("");
      const [authName, setAuthName] = useState("");
      const [authError, setAuthError] = useState("");

      const [comments, setComments] = useState([]);
      const [newComment, setNewComment] = useState("");
      
      // Estado para o Painel de Administração
      const [registeredUsers, setRegisteredUsers] = useState([]);

      // 1. Auth Listener
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) { console.error("Erro auth", e); }
        };

        const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
          if (currentUser) {
             setUser(currentUser);
             // Verifica se o utilizador é o Administrador pelo e-mail
             setIsAdmin(currentUser.email === 'admin@edw.com');
          } else {
             setUser(null);
             setIsAdmin(false);
             try { await signInAnonymously(auth); } catch(e) {}
          }
        });

        initAuth();
        return () => unsubscribe();
      }, []);

      // 2. Fetch Views
      useEffect(() => {
        if (!user || !db) return;
        const viewsRef = collection(db, 'artifacts', appId, 'public', 'data', 'videoViews');
        const unsubscribe = onSnapshot(viewsRef, (snapshot) => {
          const counts = {};
          snapshot.forEach(docSnap => { counts[docSnap.id] = docSnap.data().views || 0; });
          setViewCounts(counts);
        }, (error) => console.error("Erro views:", error));
        return () => unsubscribe();
      }, [user]);

      // 3. Fetch Comments for Current Video
      useEffect(() => {
        if (!user || !db || currentView !== 'video' || !currentVideo) return;
        const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', `comments_video_${currentVideo.id}`);
        const unsubscribe = onSnapshot(commentsRef, (snapshot) => {
          const fetchedComments = [];
          snapshot.forEach(docSnap => { fetchedComments.push({ id: docSnap.id, ...docSnap.data() }); });
          fetchedComments.sort((a, b) => b.createdAt - a.createdAt);
          setComments(fetchedComments);
        });
        return () => unsubscribe();
      }, [user, currentVideo, currentView]);

      // 4. Fetch Users for Admin Panel
      useEffect(() => {
        if (!user || !db || currentView !== 'admin' || !isAdmin) return;
        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'app_users');
        const unsubscribe = onSnapshot(usersRef, (snapshot) => {
          const fetchedUsers = [];
          snapshot.forEach(docSnap => { fetchedUsers.push({ id: docSnap.id, ...docSnap.data() }); });
          setRegisteredUsers(fetchedUsers);
        });
        return () => unsubscribe();
      }, [user, currentView, isAdmin]);

      const toggleSidebar = () => setIsSidebarOpen(!isSidebarOpen);
      
      const playVideo = async (video) => {
        setCurrentVideo(video);
        setCurrentView("video");
        setIsSidebarOpen(false);
        
        // --- NOVA LÓGICA: PRIORIZAR A NUVEM (DRIVE) ---
        // Assim garante que mesmo abrindo no PC, ele vai tentar baixar o vídeo direto da internet
        // e não dará tela preta se faltar o ficheiro .mp4 na sua pasta.
        if (video.driveId || video.youtubeId) {
          setVideoSource('drive');
        } else {
          setVideoSource('local');
        }
        
        window.scrollTo(0, 0);

        if (user && db) {
          try {
            const videoRef = doc(db, 'artifacts', appId, 'public', 'data', 'videoViews', String(video.id));
            await setDoc(videoRef, { views: increment(1) }, { merge: true });
          } catch (e) { console.error("Erro ao registar a visualização", e); }
        }
      };
      
      const goHome = () => {
        setCurrentVideo(null);
        setCurrentView("home");
        setIsSidebarOpen(true);
      };

      const openAdminPanel = () => {
        setCurrentVideo(null);
        setCurrentView("admin");
        setIsSidebarOpen(false);
      }

      // Autenticação (Login e Registo a guardar no DB)
      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError("");
        try {
          await signInWithEmailAndPassword(auth, authEmail, authPassword);
          setShowAuthModal(false);
          setAuthEmail(""); setAuthPassword("");
        } catch (err) {
          console.error(err);
          if (err.code === 'auth/invalid-credential') setAuthError("E-mail ou palavra-passe incorretos.");
          else if (err.code === 'auth/invalid-email') setAuthError("Formato de e-mail inválido.");
          else if (err.message.includes('API key')) setAuthError("Esqueceu-se de configurar a sua apiKey do Firebase no código.");
          else setAuthError("Erro ao fazer login: " + err.message);
        }
      };

      const handleRegister = async (e) => {
        e.preventDefault();
        setAuthError("");
        try {
          const userCredential = await createUserWithEmailAndPassword(auth, authEmail, authPassword);
          await updateProfile(userCredential.user, { displayName: authName });
          
          // Salva o utilizador no Firestore para aparecer no Painel Admin
          if (db) {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_users', userCredential.user.uid);
            await setDoc(userRef, {
              name: authName,
              email: authEmail,
              role: authEmail === 'admin@edw.com' ? 'admin' : 'user',
              createdAt: Date.now()
            });
          }

          setShowAuthModal(false);
          setAuthEmail(""); setAuthPassword(""); setAuthName("");
        } catch (err) {
          console.error(err);
          if (err.code === 'auth/email-already-in-use') setAuthError("Este e-mail já está registado. Tente fazer login.");
          else if (err.code === 'auth/weak-password') setAuthError("A palavra-passe deve ter pelo menos 6 caracteres.");
          else if (err.code === 'auth/invalid-email') setAuthError("Formato de e-mail inválido.");
          else if (err.code === 'auth/operation-not-allowed') setAuthError("Erro: Tem de ativar o login por E-mail/Palavra-passe no painel do Firebase > Authentication.");
          else if (err.message.includes('API key')) setAuthError("Esqueceu-se de colocar as suas chaves do Firebase (apiKey, projectId, etc) no código.");
          else setAuthError("Erro ao criar conta: " + err.message);
        }
      };

      const handleLogout = () => {
        if (auth) {
          signOut(auth);
          goHome();
        }
      };

      const handleAddComment = async (e) => {
        e.preventDefault();
        if (!user || user.isAnonymous) { setShowAuthModal(true); return; }
        if (!newComment.trim()) return;

        try {
          const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', `comments_video_${currentVideo.id}`);
          await addDoc(commentsRef, {
            text: newComment,
            authorName: user.displayName || 'Utilizador',
            authorEmail: user.email,
            authorId: user.uid,
            createdAt: Date.now()
          });
          setNewComment("");
        } catch (err) { console.error("Erro ao enviar comentário:", err); }
      };

      const handleDeleteUser = async (userId) => {
        if (!confirm("Tem a certeza que deseja remover o acesso deste utilizador?")) return;
        try {
          const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_users', userId);
          await deleteDoc(userRef);
        } catch (err) { console.error("Erro ao apagar utilizador:", err); }
      };

      const exportToExcel = () => {
        let csvContent = "data:text/csv;charset=utf-8,Nome,Email,Funcao,Data de Cadastro\n";
        registeredUsers.forEach(u => {
          const date = new Date(u.createdAt).toLocaleDateString('pt-BR');
          csvContent += `"${u.name}","${u.email}","${u.role}","${date}"\n`;
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "edw_usuarios.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const filteredVideos = VIDEOS.filter(video => {
        const matchesCategory = activeCategory === "Todos os Treinamentos" || video.category === activeCategory;
        const matchesSearch = video.title.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      return (
        <div className="flex flex-col h-screen overflow-hidden font-sans">
          
          {/* HEADER */}
          <header className="flex items-center justify-between px-4 h-14 bg-[#0f0f0f] border-b border-[#303030] sticky top-0 z-50">
            <div className="flex items-center gap-4">
              <button onClick={toggleSidebar} className="p-2 hover:bg-[#272727] rounded-full transition-colors hidden sm:block">
                <i className="fa-solid fa-bars text-xl"></i>
              </button>
              
              <div className="flex items-center gap-2 cursor-pointer" onClick={goHome}>
                <div className="bg-blue-600 p-1.5 rounded-lg w-8 h-8 flex items-center justify-center">
                  <i className="fa-solid fa-graduation-cap text-white text-sm"></i>
                </div>
                <span className="text-xl font-bold tracking-tight">
                  EDW <span className="font-light text-blue-400">Treinamentos</span>
                </span>
              </div>
            </div>

            <div className="flex-1 max-w-xl mx-4 lg:mx-10 hidden sm:block">
              {currentView !== 'admin' && (
                <div className="flex items-center bg-[#121212] border border-[#303030] rounded-full overflow-hidden focus-within:border-blue-500 transition-colors">
                  <div className="px-4 text-gray-400"><i className="fa-solid fa-magnifying-glass"></i></div>
                  <input 
                    type="text" 
                    placeholder="Pesquisar treinamento..." 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="flex-1 bg-transparent py-2 pr-4 outline-none text-sm text-white placeholder-gray-500"
                  />
                </div>
              )}
            </div>

            {/* SECÇÃO DO UTILIZADOR */}
            <div className="flex items-center gap-3">
              {user && !user.isAnonymous ? (
                <div className="flex items-center gap-4">
                  <div className="hidden sm:flex items-center gap-2">
                     <div className={`w-7 h-7 rounded-full flex items-center justify-center font-bold text-xs ${isAdmin ? 'bg-red-600' : 'bg-blue-600'}`}>
                        {isAdmin ? <i className="fa-solid fa-shield-halved"></i> : (user.displayName ? user.displayName.charAt(0).toUpperCase() : 'U')}
                     </div>
                     <span className="text-sm font-medium hidden md:block">
                       {user.displayName || 'Utilizador'} {isAdmin && <span className="text-red-400 text-xs ml-1">(Admin)</span>}
                     </span>
                  </div>
                  <button onClick={handleLogout} className="text-sm text-gray-400 hover:text-white transition-colors">Sair</button>
                </div>
              ) : (
                <button 
                  onClick={() => { setAuthMode('login'); setShowAuthModal(true); }} 
                  className="flex items-center gap-2 bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 border border-blue-600/30 px-4 py-1.5 rounded-full text-sm font-medium transition-colors"
                >
                  <i className="fa-regular fa-user"></i> Entrar
                </button>
              )}
            </div>
          </header>

          {/* MAIN LAYOUT */}
          <div className="flex flex-1 overflow-hidden">
            
            {/* SIDEBAR */}
            <aside 
              className={`bg-[#0f0f0f] flex-shrink-0 transition-all duration-300 border-r border-[#303030] ${
                currentView !== 'home' ? 'hidden' : (isSidebarOpen ? 'w-64 px-3' : 'w-[72px] px-1 hidden lg:flex flex-col items-center')
              } overflow-y-auto`}
            >
              <div className="py-4 border-b border-[#303030]">
                <div onClick={goHome}>
                   <SidebarItem iconClass="fa-solid fa-house" label="Início" active={currentView === 'home' && activeCategory === "Todos os Treinamentos"} isOpen={isSidebarOpen} />
                </div>
                {isAdmin && (
                  <div onClick={openAdminPanel}>
                    <SidebarItem iconClass="fa-solid fa-gear" label="Painel Admin" active={currentView === 'admin'} isOpen={isSidebarOpen} />
                  </div>
                )}
              </div>
              
              {isSidebarOpen && (
                <div className="py-4">
                  <h3 className="px-3 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Módulos</h3>
                  <div onClick={() => setActiveCategory("Todos os Treinamentos")}><SidebarItem iconClass="fa-solid fa-layer-group" label="Todos os Vídeos" active={activeCategory === "Todos os Treinamentos"} isOpen={true} isSubItem /></div>
                  <div onClick={() => setActiveCategory("Digitação")}><SidebarItem iconClass="fa-solid fa-circle-check" label="Digitação" active={activeCategory === "Digitação"} isOpen={true} isSubItem /></div>
                  <div onClick={() => setActiveCategory("Aumento de Margem")}><SidebarItem iconClass="fa-solid fa-circle-check" label="Aumento de Margem" active={activeCategory === "Aumento de Margem"} isOpen={true} isSubItem /></div>
                  <div onClick={() => setActiveCategory("FGTS")}><SidebarItem iconClass="fa-solid fa-circle-check" label="FGTS" active={activeCategory === "FGTS"} isOpen={true} isSubItem /></div>
                  <div onClick={() => setActiveCategory("Portabilidade")}><SidebarItem iconClass="fa-solid fa-circle-check" label="Portabilidade" active={activeCategory === "Portabilidade"} isOpen={true} isSubItem /></div>
                  <div onClick={() => setActiveCategory("Sistemas")}><SidebarItem iconClass="fa-solid fa-circle-check" label="Sistemas (V8, 360)" active={activeCategory === "Sistemas"} isOpen={true} isSubItem /></div>
                  <div onClick={() => setActiveCategory("Ferramentas")}><SidebarItem iconClass="fa-solid fa-circle-check" label="Ferramentas (WhatsApp)" active={activeCategory === "Ferramentas"} isOpen={true} isSubItem /></div>
                </div>
              )}
            </aside>

            {/* CONTENT */}
            <main className="flex-1 overflow-y-auto bg-[#0a0a0a]">
              
              {/* VISTA 1: HOME (GRADE DE VÍDEOS) */}
              {currentView === 'home' && (
                <div className="p-4 sm:p-6 max-w-7xl mx-auto">
                  <div className="mb-6 flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
                    {CATEGORIES.map((cat) => (
                      <button
                        key={cat}
                        onClick={() => setActiveCategory(cat)}
                        className={`whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-colors border ${
                          activeCategory === cat 
                          ? 'bg-blue-600 text-white border-blue-600' 
                          : 'bg-[#181818] text-gray-300 border-[#303030] hover:bg-[#272727]'
                        }`}
                      >
                        {cat}
                      </button>
                    ))}
                  </div>

                  {filteredVideos.length === 0 ? (
                    <div className="text-center text-gray-500 mt-20">Nenhum treinamento encontrado.</div>
                  ) : (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                      {filteredVideos.map((video) => (
                        <div key={video.id} onClick={() => playVideo(video)}>
                          <VideoCard video={video} viewCount={viewCounts[video.id] || 0} />
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {/* VISTA 2: PLAYER DE VÍDEO (PRIORIDADE: GOOGLE DRIVE OU YOUTUBE > LOCAL) */}
              {currentView === 'video' && currentVideo && (
                <div className="flex flex-col lg:flex-row gap-6 p-4 lg:p-6 max-w-[1600px] mx-auto">
                  <div className="flex-1 lg:max-w-[70%]">
                    
                    {/* NOVO: SELETOR MANUAL DE SERVIDOR (NUVEM OU PC) */}
                    <div className="flex gap-2 mb-3 bg-[#181818] p-1.5 rounded-lg border border-[#303030] w-fit">
                      {currentVideo.driveId && (
                        <button
                          onClick={() => setVideoSource('drive')}
                          className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors flex items-center gap-2 ${
                            videoSource === 'drive' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:text-white hover:bg-[#272727]'
                          }`}
                        >
                          <i className="fa-brands fa-google-drive"></i> Nuvem (Google Drive)
                        </button>
                      )}
                      {currentVideo.localVideo && (
                        <button
                          onClick={() => setVideoSource('local')}
                          className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors flex items-center gap-2 ${
                            videoSource === 'local' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:text-white hover:bg-[#272727]'
                          }`}
                        >
                          <i className="fa-solid fa-hard-drive"></i> Local (Ficheiro MP4)
                        </button>
                      )}
                    </div>

                    <div className="w-full aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-[#222]">
                      {videoSource === 'drive' && currentVideo.youtubeId ? (
                        <iframe 
                          src={`https://www.youtube.com/embed/${currentVideo.youtubeId}`} 
                          className="w-full h-full"
                          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                          allowFullScreen
                          title={currentVideo.title}
                          style={{ border: 'none' }}
                        ></iframe>
                      ) : videoSource === 'drive' && currentVideo.driveId && currentVideo.driveId !== "COLOQUE_O_ID_DO_DRIVE_AQUI" ? (
                        <iframe 
                          src={`https://drive.google.com/file/d/${currentVideo.driveId}/preview`} 
                          className="w-full h-full"
                          allowFullScreen
                          title={currentVideo.title}
                          style={{ border: 'none' }}
                        ></iframe>
                      ) : videoSource === 'local' && currentVideo.localVideo ? (
                        <video 
                          controls 
                          autoPlay
                          controlsList="nodownload" 
                          className="w-full h-full object-contain bg-black"
                          poster={currentVideo.thumb}
                        >
                          <source src={currentVideo.localVideo} type="video/mp4" />
                          O seu navegador não suporta a tag de vídeo.
                        </video>
                      ) : (
                        <div className="w-full h-full flex flex-col items-center justify-center text-gray-400 p-8 text-center bg-[#181818]">
                          <i className="fa-solid fa-video-slash text-4xl mb-4 opacity-50"></i>
                          <p>Vídeo não configurado.</p>
                          <p className="text-xs mt-2 text-gray-500">Verifique se o ficheiro de vídeo está na pasta correta.</p>
                        </div>
                      )}
                    </div>

                    <h1 className="text-xl sm:text-2xl font-bold mt-5 mb-2">{currentVideo.title}</h1>
                    
                    <div className="flex items-center justify-between border-b border-[#303030] pb-4 mt-2">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                          EDW
                        </div>
                        <div>
                          <div className="font-semibold text-white">{currentVideo.author}</div>
                          <div className="text-xs text-gray-400">Plataforma Interna</div>
                        </div>
                      </div>
                      <div className="text-sm text-gray-400 bg-[#181818] px-3 py-1.5 rounded-lg border border-[#303030]">
                        Módulo: {currentVideo.category}
                      </div>
                    </div>
                    
                    <div className="mt-4 bg-[#181818] rounded-xl p-4 border border-[#303030]">
                       <div className="flex items-center gap-4 text-sm text-gray-400 mb-2 font-medium">
                          <span>{formatViews(viewCounts[currentVideo.id] || 0)}</span>
                          <span>Duração: {currentVideo.duration}</span>
                       </div>
                       <p className="text-sm text-gray-300 mb-4">
                         Treinamento operacional sobre <strong>{currentVideo.title}</strong>. 
                         Certifique-se de assistir até o final.
                       </p>

                       {/* AVISO DE SEGURANÇA PARA VÍDEOS DO YOUTUBE */}
                       {currentVideo.youtubeId && (
                         <div className="mt-2 pt-4 border-t border-[#303030]">
                           <h4 className="text-sm font-semibold mb-3 flex items-center gap-2">
                             <i className="fa-brands fa-youtube text-red-500"></i> Problemas a reproduzir o vídeo?
                           </h4>
                           <p className="text-xs text-gray-400 mb-3">Se o reprodutor acima der erro, poderá assistir à aula diretamente na página oficial do YouTube através do botão abaixo.</p>
                           <a 
                             href={`https://www.youtube.com/watch?v=${currentVideo.youtubeId}`} 
                             target="_blank" 
                             rel="noopener noreferrer"
                             className="inline-flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                           >
                             <i className="fa-solid fa-arrow-up-right-from-square"></i> Assistir diretamente no YouTube
                           </a>
                         </div>
                       )}

                       {currentVideo.materialLink && (
                         <div className="mt-2 pt-4 border-t border-[#303030]">
                           <h4 className="text-sm font-semibold mb-3 flex items-center gap-2">
                             <i className="fa-solid fa-paperclip text-blue-400"></i> Material de Apoio
                           </h4>
                           <a 
                             href={currentVideo.materialLink} 
                             target="_blank" 
                             rel="noopener noreferrer"
                             className="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                           >
                             <i className="fa-solid fa-download"></i> Baixar Material
                           </a>
                         </div>
                       )}
                    </div>

                    <div className="mt-6 pt-6 border-t border-[#303030]">
                       <h3 className="text-lg font-bold mb-6 flex items-center gap-2">
                         <i className="fa-regular fa-comments"></i> Comentários ({comments.length})
                       </h3>
                       
                       <form onSubmit={handleAddComment} className="flex gap-4 mb-8">
                         <div className="w-10 h-10 bg-[#272727] rounded-full flex items-center justify-center text-white font-bold flex-shrink-0">
                           {user && !user.isAnonymous && user.displayName ? user.displayName.charAt(0).toUpperCase() : <i className="fa-regular fa-user"></i>}
                         </div>
                         <div className="flex-1 flex flex-col items-end gap-2">
                           <textarea 
                             value={newComment}
                             onChange={(e) => setNewComment(e.target.value)}
                             onClick={() => { if (!user || user.isAnonymous) setShowAuthModal(true); }}
                             placeholder={user && !user.isAnonymous ? "Adicione um comentário à aula..." : "Faça login para comentar nesta aula"}
                             className="w-full bg-transparent border-b border-[#303030] focus:border-blue-500 outline-none resize-none py-2 text-sm transition-colors"
                             rows="1"
                           ></textarea>
                           {newComment.trim() && (
                             <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-full text-sm font-medium transition-colors">
                               Comentar
                             </button>
                           )}
                         </div>
                       </form>

                       <div className="flex flex-col gap-6">
                         {comments.map(comment => (
                           <div key={comment.id} className="flex gap-4">
                             <div className="w-10 h-10 bg-blue-900 rounded-full flex items-center justify-center text-blue-200 font-bold flex-shrink-0 text-sm">
                               {comment.authorName ? comment.authorName.charAt(0).toUpperCase() : 'U'}
                             </div>
                             <div className="flex flex-col">
                               <div className="flex items-center gap-2">
                                 <span className="font-semibold text-[13px]">{comment.authorName}</span>
                                 <span className="text-[11px] text-gray-500">{new Date(comment.createdAt).toLocaleDateString('pt-BR')}</span>
                               </div>
                               <p className="text-sm text-gray-200 mt-1 whitespace-pre-wrap">{comment.text}</p>
                             </div>
                           </div>
                         ))}
                         {comments.length === 0 && (
                           <p className="text-sm text-gray-500">Nenhum comentário ainda. Seja o primeiro a comentar!</p>
                         )}
                       </div>
                    </div>
                  </div>

                  <div className="flex-1 lg:max-w-[30%] lg:min-w-[350px]">
                    <div className="bg-[#181818] rounded-xl border border-[#303030] p-4">
                      <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                        <i className="fa-regular fa-clock text-blue-500"></i> Próximos Treinamentos
                      </h3>
                      
                      <div className="flex flex-col gap-3 max-h-[600px] overflow-y-auto pr-2">
                        {VIDEOS.filter(v => v.id !== currentVideo.id).map((video, index) => (
                          <div 
                            key={video.id} 
                            onClick={() => playVideo(video)} 
                            className="flex gap-3 cursor-pointer group p-2 hover:bg-[#272727] rounded-lg transition-colors"
                          >
                            <div className="text-gray-500 font-bold w-4 flex items-center justify-center text-sm">{index + 1}</div>
                            <div className="w-[120px] aspect-video rounded bg-[#222] overflow-hidden flex-shrink-0 relative border border-[#303030]">
                              <img src={video.thumb} alt="thumb" className="w-full h-full object-cover group-hover:opacity-75 transition-opacity" />
                              <span className="absolute bottom-1 right-1 bg-black/80 text-white text-[10px] px-1 rounded">{video.duration}</span>
                            </div>
                            <div className="flex flex-col justify-center">
                              <h4 className="text-sm font-medium line-clamp-2 leading-snug group-hover:text-blue-400">{video.title}</h4>
                              <span className="text-xs text-gray-500 mt-1">{video.category} • {formatViews(viewCounts[video.id] || 0)}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* VISTA 3: PAINEL DE ADMINISTRAÇÃO */}
              {currentView === 'admin' && isAdmin && (
                <div className="p-4 sm:p-8 max-w-6xl mx-auto">
                  <div className="flex items-center justify-between mb-8">
                    <h2 className="text-2xl font-bold flex items-center gap-3">
                      <i className="fa-solid fa-gear text-blue-500"></i> Painel de Administração
                    </h2>
                    <button 
                      onClick={exportToExcel}
                      className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2"
                    >
                      <i className="fa-solid fa-file-excel"></i> Exportar Dados (Excel)
                    </button>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div className="bg-[#181818] border border-[#303030] p-6 rounded-xl flex items-center gap-4">
                      <div className="w-12 h-12 bg-blue-600/20 text-blue-400 rounded-full flex items-center justify-center text-xl">
                        <i className="fa-solid fa-users"></i>
                      </div>
                      <div>
                        <div className="text-gray-400 text-sm">Utilizadores Registados</div>
                        <div className="text-2xl font-bold">{registeredUsers.length}</div>
                      </div>
                    </div>
                    <div className="bg-[#181818] border border-[#303030] p-6 rounded-xl flex items-center gap-4">
                      <div className="w-12 h-12 bg-green-600/20 text-green-400 rounded-full flex items-center justify-center text-xl">
                        <i className="fa-solid fa-play"></i>
                      </div>
                      <div>
                        <div className="text-gray-400 text-sm">Total de Vídeos</div>
                        <div className="text-2xl font-bold">{VIDEOS.length}</div>
                      </div>
                    </div>
                  </div>

                  <div className="bg-[#181818] border border-[#303030] rounded-xl overflow-hidden">
                    <div className="px-6 py-4 border-b border-[#303030] bg-[#121212]">
                      <h3 className="font-semibold text-lg">Gerir Utilizadores</h3>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-sm">
                        <thead className="bg-[#1a1a1a] text-gray-400">
                          <tr>
                            <th className="px-6 py-3 font-medium">Nome</th>
                            <th className="px-6 py-3 font-medium">E-mail</th>
                            <th className="px-6 py-3 font-medium">Data de Registo</th>
                            <th className="px-6 py-3 font-medium">Ações</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-[#303030]">
                          {registeredUsers.length === 0 ? (
                            <tr><td colSpan="4" className="px-6 py-8 text-center text-gray-500">Nenhum utilizador encontrado.</td></tr>
                          ) : (
                            registeredUsers.map(u => (
                              <tr key={u.id} className="hover:bg-[#222] transition-colors">
                                <td className="px-6 py-4 font-medium flex items-center gap-3">
                                  <div className="w-8 h-8 rounded-full bg-blue-900 flex items-center justify-center text-blue-200 text-xs">
                                    {u.name ? u.name.charAt(0).toUpperCase() : 'U'}
                                  </div>
                                  {u.name}
                                  {u.role === 'admin' && <span className="bg-red-600/20 text-red-400 text-[10px] px-2 py-0.5 rounded border border-red-600/30">ADMIN</span>}
                                </td>
                                <td className="px-6 py-4 text-gray-300">{u.email}</td>
                                <td className="px-6 py-4 text-gray-400">{new Date(u.createdAt).toLocaleDateString('pt-BR')}</td>
                                <td className="px-6 py-4">
                                  {u.role !== 'admin' && (
                                    <button 
                                      onClick={() => handleDeleteUser(u.id)}
                                      className="text-red-400 hover:text-red-300 transition-colors"
                                      title="Remover Utilizador"
                                    >
                                      <i className="fa-solid fa-trash"></i>
                                    </button>
                                  )}
                                </td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}
            </main>
          </div>

          {/* MODAL DE AUTENTICAÇÃO */}
          {showAuthModal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
              <div className="bg-[#181818] p-8 rounded-2xl border border-[#303030] w-full max-w-md relative shadow-2xl">
                <button 
                  onClick={() => { setShowAuthModal(false); setAuthError(""); }} 
                  className="absolute top-4 right-4 text-gray-400 hover:text-white w-8 h-8 flex items-center justify-center rounded-full hover:bg-[#303030] transition-colors"
                >
                  <i className="fa-solid fa-xmark text-xl"></i>
                </button>
                
                <h2 className="text-2xl font-bold mb-6 text-center">
                  {authMode === 'login' ? 'Aceder à Conta' : 'Criar Conta'}
                </h2>
                
                {authError && (
                  <div className="bg-red-500/10 border border-red-500/50 text-red-400 text-sm p-3 rounded-lg mb-4 text-center">
                     {authError}
                  </div>
                )}
                
                <form onSubmit={authMode === 'login' ? handleLogin : handleRegister} className="flex flex-col gap-4">
                  {authMode === 'register' && (
                    <div className="flex flex-col gap-1">
                      <label className="text-xs text-gray-400 font-medium ml-1">O seu Nome</label>
                      <input 
                        type="text" placeholder="Ex: João Silva" required
                        className="bg-[#121212] border border-[#303030] p-3 rounded-lg outline-none focus:border-blue-500 transition-colors text-sm" 
                        value={authName} onChange={e => setAuthName(e.target.value)} 
                      />
                    </div>
                  )}
                  <div className="flex flex-col gap-1">
                    <label className="text-xs text-gray-400 font-medium ml-1">E-mail Corporativo</label>
                    <input 
                      type="email" placeholder="seu.email@empresa.com" required
                      className="bg-[#121212] border border-[#303030] p-3 rounded-lg outline-none focus:border-blue-500 transition-colors text-sm" 
                      value={authEmail} onChange={e => setAuthEmail(e.target.value)} 
                    />
                  </div>
                  <div className="flex flex-col gap-1">
                    <label className="text-xs text-gray-400 font-medium ml-1">Palavra-passe</label>
                    <input 
                      type="password" placeholder="••••••••" required minLength="6"
                      className="bg-[#121212] border border-[#303030] p-3 rounded-lg outline-none focus:border-blue-500 transition-colors text-sm" 
                      value={authPassword} onChange={e => setAuthPassword(e.target.value)} 
                    />
                  </div>
                  <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg mt-4 transition-colors">
                    {authMode === 'login' ? 'Entrar na Plataforma' : 'Finalizar Registo'}
                  </button>
                </form>
                
                <div className="mt-6 text-center text-sm text-gray-400 border-t border-[#303030] pt-4">
                  {authMode === 'login' ? (
                    <p>Não tem uma conta? <button onClick={() => { setAuthMode('register'); setAuthError(''); }} className="text-blue-400 hover:text-blue-300 font-medium">Registe-se</button></p>
                  ) : (
                    <p>Já tem conta? <button onClick={() => { setAuthMode('login'); setAuthError(''); }} className="text-blue-400 hover:text-blue-300 font-medium">Faça login</button></p>
                  )}
                </div>
              </div>
            </div>
          )}
          
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<EDWTreinamentos />);
  </script>
</body>
</html>
