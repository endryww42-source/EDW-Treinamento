<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDW Treinamentos - Admin</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #303030; border-radius: 4px; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const SHEETDB_API_URL = "https://sheetdb.io/api/v1/tpv90ot57kp83";

    function AdminApp() {
      const [users, setUsers] = useState([]);
      const [videos, setVideos] = useState([]);
      const [showVideoForm, setShowVideoForm] = useState(false);
      const [newVideo, setNewVideo] = useState({ title: "", category: "Digitação", duration: "", thumb: "", driveId: "", description: "", downloadLink: "" });
      const [loading, setLoading] = useState(true);

      const fetchData = async () => {
        setLoading(true);
        try {
          const [uRes, vRes] = await Promise.all([
            fetch(`${SHEETDB_API_URL}?sheet=usuarios`),
            fetch(`${SHEETDB_API_URL}?sheet=aulas`)
          ]);
          setUsers(await uRes.json());
          setVideos(await vRes.json());
        } catch (e) { console.error("Falha no banco de dados."); }
        setLoading(false);
      };

      useEffect(() => { fetchData(); }, []);

      const handleDeleteUser = async (email) => {
        if (!confirm(`Remover permanentemente o acesso de ${email}?`)) return;
        const res = await fetch(`${SHEETDB_API_URL}/email/${email}?sheet=usuarios`, { method: 'DELETE' });
        if (res.ok) setUsers(users.filter(u => u.email !== email));
      };

      const handleUpdateRole = async (email, currentRole) => {
        const newRole = currentRole === 'admin' ? 'user' : 'admin';
        if (!confirm(`Mudar cargo para ${newRole.toUpperCase()}?`)) return;
        const res = await fetch(`${SHEETDB_API_URL}/email/${email}?sheet=usuarios`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: { role: newRole } })
        });
        if (res.ok) setUsers(users.map(u => u.email === email ? { ...u, role: newRole } : u));
      };

      const handleAddVideo = async (e) => {
        e.preventDefault();
        const videoData = { ...newVideo, id: Date.now(), createdAt: new Date().toISOString() };
        const res = await fetch(`${SHEETDB_API_URL}?sheet=aulas`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: [videoData] })
        });
        if (res.ok) {
          setVideos([...videos, videoData]);
          setNewVideo({ title: "", category: "Digitação", duration: "", thumb: "", driveId: "", description: "", downloadLink: "" });
          setShowVideoForm(false);
        }
      };

      const handleDeleteVideo = async (id) => {
        if (!confirm("Excluir este vídeo da planilha?")) return;
        const res = await fetch(`${SHEETDB_API_URL}/id/${id}?sheet=aulas`, { method: 'DELETE' });
        if (res.ok) setVideos(videos.filter(v => v.id != id));
      };

      return (
        <div className="min-h-screen p-6 lg:p-12">
          <div className="max-w-6xl mx-auto">
            <div className="flex items-center justify-between mb-12">
               <div className="flex items-center gap-4">
                  <div className="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-900/30">
                     <i className="fa-solid fa-fingerprint text-white text-xl"></i>
                  </div>
                  <h1 className="text-3xl font-black text-white tracking-tighter">Painel Master <span className="text-blue-500 font-light">EDW</span></h1>
               </div>
               <div className="flex gap-4">
                  <button onClick={() => setShowVideoForm(!showVideoForm)} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold text-sm transition-all shadow-lg active:scale-95">
                    {showVideoForm ? 'Fechar Cadastro' : 'Cadastrar Nova Aula'}
                  </button>
                  <a href="index.html" className="bg-[#181818] border border-[#333] px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-[#222]">Voltar ao Site</a>
               </div>
            </div>

            {loading ? (
              <div className="py-20 text-center text-gray-500 animate-pulse">Sincronizando com a Planilha Google...</div>
            ) : (
              <div className="space-y-12">
                {/* FORM CADASTRO */}
                {showVideoForm && (
                  <div className="bg-[#141414] p-8 rounded-3xl border border-blue-500/20 shadow-2xl">
                    <h3 className="text-xl font-bold mb-6 flex items-center gap-2"><i className="fa-solid fa-plus-circle text-blue-500"></i> Informações do Treinamento</h3>
                    <form onSubmit={handleAddVideo} className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-gray-500 uppercase">Título da Aula</label>
                        <input type="text" required className="w-full bg-black border border-[#333] p-3 rounded-xl outline-none focus:border-blue-500" value={newVideo.title} onChange={e=>setNewVideo({...newVideo, title: e.target.value})} />
                      </div>
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-gray-500 uppercase">Categoria</label>
                        <select className="w-full bg-black border border-[#333] p-3 rounded-xl outline-none focus:border-blue-500" value={newVideo.category} onChange={e=>setNewVideo({...newVideo, category: e.target.value})}>
                          {["Digitação", "FGTS", "Aumento de Margem", "Portabilidade", "Sistemas", "Ferramentas"].map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-gray-500 uppercase">Duração (Ex: 05:40)</label>
                        <input type="text" required className="w-full bg-black border border-[#333] p-3 rounded-xl outline-none focus:border-blue-500" value={newVideo.duration} onChange={e=>setNewVideo({...newVideo, duration: e.target.value})} />
                      </div>
                      <div className="space-y-1">
                        <label className="text-xs font-bold text-gray-500 uppercase">ID do Google Drive</label>
                        <input type="text" required className="w-full bg-black border border-[#333] p-3 rounded-xl outline-none focus:border-blue-500" value={newVideo.driveId} onChange={e=>setNewVideo({...newVideo, driveId: e.target.value})} />
                      </div>
                      <div className="space-y-1 md:col-span-2">
                        <label className="text-xs font-bold text-gray-500 uppercase">Link da Capa (Ex: ./assets/img/foto.png)</label>
                        <input type="text" required className="w-full bg-black border border-[#333] p-3 rounded-xl outline-none focus:border-blue-500" value={newVideo.thumb} onChange={e=>setNewVideo({...newVideo, thumb: e.target.value})} />
                      </div>
                      <div className="space-y-1 md:col-span-2">
                        <label className="text-xs font-bold text-blue-500 uppercase">Link de Download (Opcional)</label>
                        <input type="text" className="w-full bg-black border border-blue-900/30 p-3 rounded-xl outline-none focus:border-blue-500" value={newVideo.downloadLink} onChange={e=>setNewVideo({...newVideo, downloadLink: e.target.value})} />
                      </div>
                      <button type="submit" className="md:col-span-2 bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl">Salvar na Planilha</button>
                    </form>
                  </div>
                )}

                {/* GESTÃO DE PESSOAL */}
                <section>
                  <h3 className="text-sm font-black text-gray-500 uppercase tracking-widest mb-6">Gestão de Colaboradores e Níveis</h3>
                  <div className="bg-[#111] rounded-[2rem] overflow-hidden border border-[#222] shadow-2xl">
                    <table className="w-full text-left text-sm">
                      <thead className="bg-[#181818] text-gray-500 uppercase text-[10px] tracking-widest font-black">
                        <tr><th className="px-8 py-6">Utilizador</th><th className="px-8 py-6">Senha</th><th className="px-8 py-6">Cargo</th><th className="px-8 py-6 text-center">Ações</th></tr>
                      </thead>
                      <tbody className="divide-y divide-[#222]">
                        {users.map((u, i) => (
                          <tr key={i} className="hover:bg-[#151515] transition-colors group">
                            <td className="px-8 py-6">
                               <p className="font-bold text-gray-100">{u.name}</p>
                               <p className="text-xs text-gray-500 font-medium">{u.email}</p>
                            </td>
                            <td className="px-8 py-6 font-mono text-[10px] text-gray-600">{u.password}</td>
                            <td className="px-8 py-6">
                               <span className={`px-2 py-1 rounded text-[9px] font-black uppercase tracking-wider ${u.role === 'admin' ? 'bg-red-600/20 text-red-500 border border-red-500/20' : 'bg-blue-600/10 text-blue-400 border border-blue-500/10'}`}>
                                 {u.role || 'user'}
                               </span>
                            </td>
                            <td className="px-8 py-6 text-center flex justify-center gap-3">
                               <button onClick={() => handleUpdateRole(u.email, u.role)} className="w-9 h-9 rounded-xl bg-zinc-800 text-gray-400 hover:text-yellow-500 shadow-sm" title="Mudar Cargo"><i className="fa-solid fa-user-shield text-xs"></i></button>
                               <button onClick={() => handleDeleteUser(u.email)} className="w-9 h-9 rounded-xl bg-red-600/10 text-red-500 hover:bg-red-600 shadow-sm" title="Remover Utilizador"><i className="fa-solid fa-trash-can text-xs"></i></button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </section>

                {/* GESTÃO DE AULAS DINÂMICAS */}
                <section>
                  <h3 className="text-sm font-black text-gray-500 uppercase tracking-widest mb-6">Aulas Adicionadas via Admin</h3>
                  <div className="bg-[#111] rounded-[2rem] overflow-hidden border border-[#222] shadow-2xl">
                    <table className="w-full text-left text-sm">
                      <thead className="bg-[#181818] text-gray-500 uppercase text-[10px] tracking-widest font-black">
                        <tr><th className="px-8 py-6">Título</th><th className="px-8 py-6">Módulo</th><th className="px-8 py-6 text-center">Remover</th></tr>
                      </thead>
                      <tbody className="divide-y divide-[#222]">
                        {videos.length === 0 ? (
                          <tr><td colSpan="3" className="p-10 text-center text-gray-600 italic">Nenhum vídeo novo na aba 'aulas' ainda.</td></tr>
                        ) : (
                          videos.map((v, i) => (
                            <tr key={i} className="hover:bg-[#151515] transition-colors">
                              <td className="px-8 py-6 font-bold text-gray-100">{v.title}</td>
                              <td className="px-8 py-6 text-gray-400 font-medium">{v.category}</td>
                              <td className="px-8 py-6 text-center">
                                 <button onClick={() => handleDeleteVideo(v.id)} className="w-9 h-9 rounded-xl bg-red-600/10 text-red-500 hover:bg-red-600 shadow-sm"><i className="fa-solid fa-trash text-xs"></i></button>
                              </td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </section>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminApp />);
  </script>
</body>
</html>
