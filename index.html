<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDW Treinamentos</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #303030; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-[#0f0f0f] text-white">

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect } = React;

    // --- CONFIGURAÇÃO DO FIREBASE (PREENCHA AQUI) ---
    const firebaseConfig = {
      // COPIE A API KEY COMPLETA DA SUA FOTO E COLE ABAIXO:
      apiKey: "COLE_AQUI_SUA_API_KEY_COMPLETA", 
      authDomain: "edw-treinamentos-61d06.firebaseapp.com",
      projectId: "edw-treinamentos-61d06",
      storageBucket: "edw-treinamentos-61d06.firebasestorage.app",
      messagingSenderId: "75949574229",
      // COPIE O APP ID COMPLETO DA SUA FOTO E COLE ABAIXO:
      appId: "COLE_AQUI_SEU_APP_ID_COMPLETO" 
    };

    let app, auth, db, appId = firebaseConfig.projectId;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.error("Erro ao conectar ao Firebase:", e);
    }

    const CATEGORIES = ["Todos os Treinamentos", "Digitação", "FGTS", "Aumento de Margem", "Portabilidade", "Sistemas", "Ferramentas"];

    const VIDEOS = [
      { id: 1, title: "Aula FGTS V8", author: "Treinamento EDW", category: "FGTS", duration: "4:52", thumb: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Aula FGTS V8.mp4", driveId: "1LvZ5VGF9NH7gUYrgcIFWNIb7Bx8BHjS8" },
      { id: 2, title: "Como Filtrar Dados das planilhas bagunçadas da V8", author: "Treinamento EDW", category: "Sistemas", duration: "12:13", thumb: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Como Filtrar Dados das planilhas bagunçadas da V8.mp4", driveId: "19vRifEQXqrElPpAAdbJixIB0zvpum0Kn" },
      { id: 3, title: "Colocar Extensão manual", author: "Treinamento EDW", category: "Ferramentas", duration: "8:59", thumb: "./assets/img/colocar_extensao_manual.png", localVideo: "./assets/Colocar Extensão manual.mp4", driveId: "19lnhQSdCZoo0Uo0S3fx9l7mjlVp8E162" },
      { id: 4, title: "Digitação BMG Aumento de Margem", author: "Treinamento EDW", category: "Aumento de Margem", duration: "4:45", thumb: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação BMG Aumento de Margem.mp4", driveId: "1eoayq9v-zoyOkHnSNlSaJWAVpRAoI7-Q" },
      { id: 5, title: "Digitação BMG Aumento de Margem1", author: "Treinamento EDW", category: "Aumento de Margem", duration: "4:45", thumb: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação BMG Aumento de Margem1.mp4", driveId: "1OYVoPUG0BZLjPQlSDAEG5qYeb2RgeVIW" },
      { id: 6, title: "Digitação BRB", author: "Treinamento EDW", category: "Digitação", duration: "1:56", thumb: "https://images.unsplash.com/photo-1601597111158-2fceff292cdc?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação BRB.mp4", driveId: "1XrpG2BMqQyNVm0wJH4skHr7QESL9MFjS" },
      { id: 7, title: "Digitação FACTA Aumento de margem INSS", author: "Treinamento EDW", category: "Aumento de Margem", duration: "8:53", thumb: "https://images.unsplash.com/photo-1556740714-a8395b3bf30f?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação FACTA Aumento de margem INSS.mp4", driveId: "1v8H4RBaj2NDvrXQJbNZWhavhF_ODfN2_" },
      { id: 8, title: "Digitação FGTS Facta Financeira", author: "Treinamento EDW", category: "FGTS", duration: "6:23", thumb: "https://images.unsplash.com/photo-1579621970588-a35d0e7ab9b6?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação FGTS Facta Financeira.mp4", driveId: "1Wb3_b0P4P9EM_jtwGg3R6oug6EBDpVDY" },
      { id: 9, title: "Digitação Novo 360bank", author: "Treinamento EDW", category: "Digitação", duration: "3:20", thumb: "https://images.unsplash.com/photo-1616803140344-6682afb13cda?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação Novo 360bank.mp4", driveId: "1-2XcPk0ZZrjOcF16GMN5Oj_BCmVlEv9-" },
      { id: 10, title: "Digitação Portabilidade (REP LE) Facta Financeira", author: "Treinamento EDW", category: "Portabilidade", duration: "7:25", thumb: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação Portabilidade (REP LE) Facta Financeira.mp4", driveId: "1j8Ai53hbtzJIG_Zy_5e9PoC8rN9Fj82n" },
      { id: 11, title: "Usar as ferramentas de disparo whatsapp", author: "Treinamento EDW", category: "Ferramentas", duration: "5:43", thumb: "https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Usar as ferramentas de disparo whatsapp.mp4", driveId: "1pd2PyBNanGWoLCIiRb3Px_WjTw8FR2RX" }
    ];

    function SidebarItem({ iconClass, label, active, isOpen, isSubItem = false }) {
      if (!isOpen) return null;
      return (
        <div className={`flex items-center px-3 py-2.5 mx-2 rounded-lg cursor-pointer transition-colors ${
          active ? 'bg-blue-600/10 text-blue-400 font-medium' : 'hover:bg-[#272727] text-gray-300'
        } ${isSubItem ? 'mt-1' : 'mb-1'}`}>
          <div className={`mr-3 w-5 text-center ${active ? 'text-blue-400' : 'text-gray-400'}`}>
            <i className={iconClass}></i>
          </div>
          <span className="text-sm truncate flex-1">{label}</span>
        </div>
      );
    }

    function VideoCard({ video, viewCount }) {
      return (
        <div className="flex flex-col cursor-pointer group h-full">
          <div className="relative w-full aspect-video rounded-xl overflow-hidden mb-3 border border-[#303030] bg-[#1a1a1a]">
            <img src={video.thumb} alt={video.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300 opacity-90 group-hover:opacity-100" />
            <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors"></div>
            <div className="absolute bottom-1.5 right-1.5 bg-black/80 text-white text-xs font-medium px-1.5 py-0.5 rounded backdrop-blur-sm">
              {video.duration}
            </div>
            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
              <div className="w-12 h-12 bg-blue-600/90 rounded-full flex items-center justify-center backdrop-blur-md shadow-lg">
                <i className="fa-solid fa-play text-white ml-1 text-lg"></i>
              </div>
            </div>
          </div>
          <div className="flex flex-col px-1">
            <h3 className="text-gray-100 text-[15px] font-semibold line-clamp-2 leading-snug group-hover:text-blue-400" title={video.title}>
              {video.title}
            </h3>
            <div className="text-gray-400 text-sm mt-1.5 flex items-center gap-2">
              <span className="bg-[#222] px-2 py-0.5 rounded text-xs border border-[#333]">{video.category}</span>
              <span className="text-xs">• {viewCount || 0} visualizações</span>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [activeCategory, setActiveCategory] = useState("Todos os Treinamentos");
      const [currentView, setCurrentView] = useState("home");
      const [currentVideo, setCurrentVideo] = useState(null);
      const [videoSource, setVideoSource] = useState('drive');
      const [searchQuery, setSearchQuery] = useState("");
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [viewCounts, setViewCounts] = useState({});
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authMode, setAuthMode] = useState('login');
      const [authEmail, setAuthEmail] = useState("");
      const [authPassword, setAuthPassword] = useState("");
      const [authName, setAuthName] = useState("");
      const [authError, setAuthError] = useState("");
      const [comments, setComments] = useState([]);
      const [newComment, setNewComment] = useState("");
      const [registeredUsers, setRegisteredUsers] = useState([]);

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {}
        };
        const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
          if (currentUser) {
             setUser(currentUser);
             setIsAdmin(currentUser.email === 'admin@edw.com');
          } else {
             setUser(null);
             setIsAdmin(false);
             try { await signInAnonymously(auth); } catch(e) {}
          }
        });
        initAuth();
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const viewsRef = collection(db, 'artifacts', appId, 'public', 'data', 'videoViews');
        const unsubscribe = onSnapshot(viewsRef, (snapshot) => {
          const counts = {};
          snapshot.forEach(docSnap => { counts[docSnap.id] = docSnap.data().views || 0; });
          setViewCounts(counts);
        });
        return () => unsubscribe();
      }, [user]);

      useEffect(() => {
        if (!user || !db || currentView !== 'video' || !currentVideo) return;
        const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', `comments_video_${currentVideo.id}`);
        const unsubscribe = onSnapshot(commentsRef, (snapshot) => {
          const fetchedComments = [];
          snapshot.forEach(docSnap => { fetchedComments.push({ id: docSnap.id, ...docSnap.data() }); });
          fetchedComments.sort((a, b) => b.createdAt - a.createdAt);
          setComments(fetchedComments);
        });
        return () => unsubscribe();
      }, [user, currentVideo, currentView]);

      useEffect(() => {
        if (!user || !db || currentView !== 'admin' || !isAdmin) return;
        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'app_users');
        const unsubscribe = onSnapshot(usersRef, (snapshot) => {
          const fetchedUsers = [];
          snapshot.forEach(docSnap => { fetchedUsers.push({ id: docSnap.id, ...docSnap.data() }); });
          setRegisteredUsers(fetchedUsers);
        });
        return () => unsubscribe();
      }, [user, currentView, isAdmin]);

      const playVideo = async (video) => {
        setCurrentVideo(video);
        setCurrentView("video");
        setIsSidebarOpen(false);
        setVideoSource(video.driveId ? 'drive' : 'local');
        window.scrollTo(0, 0);

        if (user && db) {
          try {
            const videoRef = doc(db, 'artifacts', appId, 'public', 'data', 'videoViews', String(video.id));
            await setDoc(videoRef, { views: increment(1) }, { merge: true });
          } catch (e) {}
        }
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError("");
        try {
          await signInWithEmailAndPassword(auth, authEmail, authPassword);
          setShowAuthModal(false);
          setAuthEmail(""); setAuthPassword("");
        } catch (err) {
           setAuthError("Erro: " + (err.code === 'auth/invalid-api-key' ? "Chave de API inválida no código." : err.message));
        }
      };

      const handleRegister = async (e) => {
        e.preventDefault();
        setAuthError("");
        try {
          const userCredential = await createUserWithEmailAndPassword(auth, authEmail, authPassword);
          await updateProfile(userCredential.user, { displayName: authName });
          if (db) {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_users', userCredential.user.uid);
            await setDoc(userRef, { name: authName, email: authEmail, role: authEmail === 'admin@edw.com' ? 'admin' : 'user', createdAt: Date.now() });
          }
          setShowAuthModal(false);
          setAuthEmail(""); setAuthPassword(""); setAuthName("");
        } catch (err) {
           setAuthError("Erro: " + (err.code === 'auth/invalid-api-key' ? "Chave de API inválida no código." : err.message));
        }
      };

      const handleAddComment = async (e) => {
        e.preventDefault();
        if (!user || user.isAnonymous) { setShowAuthModal(true); return; }
        if (!newComment.trim()) return;
        try {
          const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', `comments_video_${currentVideo.id}`);
          await addDoc(commentsRef, { text: newComment, authorName: user.displayName || 'Utilizador', authorEmail: user.email, authorId: user.uid, createdAt: Date.now() });
          setNewComment("");
        } catch (err) {}
      };

      const filteredVideos = VIDEOS.filter(v => {
        const matchCat = activeCategory === "Todos os Treinamentos" || v.category === activeCategory;
        const matchSearch = v.title.toLowerCase().includes(searchQuery.toLowerCase());
        return matchCat && matchSearch;
      });

      return (
        <div className="flex flex-col h-screen overflow-hidden font-sans">
          <header className="flex items-center justify-between px-4 h-14 bg-[#0f0f0f] border-b border-[#303030] sticky top-0 z-50">
            <div className="flex items-center gap-4">
              <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-[#272727] rounded-full hidden sm:block"><i className="fa-solid fa-bars text-xl"></i></button>
              <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setCurrentView("home"); setIsSidebarOpen(true);}}>
                <div className="bg-blue-600 p-1.5 rounded-lg w-8 h-8 flex items-center justify-center"><i className="fa-solid fa-graduation-cap text-white text-sm"></i></div>
                <span className="text-xl font-bold">EDW <span className="font-light text-blue-400">Treinamentos</span></span>
              </div>
            </div>
            <div className="flex-1 max-w-xl mx-4 hidden sm:block">
              {currentView !== 'admin' && (
                <div className="flex items-center bg-[#121212] border border-[#303030] rounded-full px-4 py-1.5">
                  <i className="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
                  <input type="text" placeholder="Pesquisar..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="bg-transparent outline-none w-full text-sm" />
                </div>
              )}
            </div>
            <div>
              {user && !user.isAnonymous ? (
                <div className="flex items-center gap-3">
                  <span className="text-sm hidden md:block">{user.displayName}</span>
                  <button onClick={() => signOut(auth)} className="text-xs text-gray-400 hover:text-white">Sair</button>
                </div>
              ) : (
                <button onClick={() => {setAuthMode('login'); setShowAuthModal(true);}} className="bg-blue-600 px-4 py-1.5 rounded-full text-sm font-medium">Entrar</button>
              )}
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden">
            <aside className={`${isSidebarOpen ? 'w-64' : 'w-0'} bg-[#0f0f0f] transition-all duration-300 border-r border-[#303030] overflow-y-auto overflow-x-hidden`}>
              <div className="py-4 border-b border-[#303030]">
                <div onClick={() => {setCurrentView("home"); setActiveCategory("Todos os Treinamentos");}}><SidebarItem iconClass="fa-solid fa-house" label="Início" active={currentView === 'home' && activeCategory === "Todos os Treinamentos"} isOpen={true} /></div>
                {isAdmin && <div onClick={() => setCurrentView("admin")}><SidebarItem iconClass="fa-solid fa-gear" label="Painel Admin" active={currentView === 'admin'} isOpen={true} /></div>}
              </div>
              <div className="py-4">
                <h3 className="px-5 mb-2 text-xs font-semibold text-gray-500 uppercase">Módulos</h3>
                {CATEGORIES.map(cat => (
                  <div key={cat} onClick={() => {setActiveCategory(cat); setCurrentView("home");}}><SidebarItem iconClass="fa-solid fa-circle-play" label={cat} active={activeCategory === cat} isOpen={true} isSubItem /></div>
                ))}
              </div>
            </aside>

            <main className="flex-1 overflow-y-auto bg-[#0a0a0a]">
              {currentView === 'home' && (
                <div className="p-6 max-w-7xl mx-auto">
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    {filteredVideos.map(v => (
                      <div key={v.id} onClick={() => playVideo(v)}><VideoCard video={v} viewCount={viewCounts[v.id]} /></div>
                    ))}
                  </div>
                </div>
              )}

              {currentView === 'video' && currentVideo && (
                <div className="flex flex-col lg:flex-row gap-6 p-6 max-w-[1600px] mx-auto">
                  <div className="flex-1">
                    <div className="flex gap-2 mb-3 bg-[#181818] p-1 rounded-lg w-fit border border-[#303030]">
                      <button onClick={() => setVideoSource('drive')} className={`px-4 py-1.5 text-xs rounded-md ${videoSource === 'drive' ? 'bg-blue-600' : 'text-gray-400'}`}>Nuvem (Google Drive)</button>
                      <button onClick={() => setVideoSource('local')} className={`px-4 py-1.5 text-xs rounded-md ${videoSource === 'local' ? 'bg-blue-600' : 'text-gray-400'}`}>Local (PC)</button>
                    </div>
                    <div className="aspect-video bg-black rounded-xl overflow-hidden border border-[#303030]">
                      {videoSource === 'drive' ? (
                        <iframe src={`https://drive.google.com/file/d/${currentVideo.driveId}/preview`} className="w-full h-full" allowFullScreen style={{border:'none'}}></iframe>
                      ) : (
                        <video controls autoPlay className="w-full h-full object-contain"><source src={currentVideo.localVideo} type="video/mp4" /></video>
                      )}
                    </div>
                    <h1 className="text-2xl font-bold mt-4">{currentVideo.title}</h1>
                    <div className="mt-4 p-4 bg-[#181818] rounded-xl border border-[#303030]">
                      <div className="flex items-center gap-4 text-sm text-gray-400 mb-2">
                        <span>{viewCounts[currentVideo.id] || 0} visualizações</span>
                        <span>Duração: {currentVideo.duration}</span>
                      </div>
                      <p className="text-sm text-gray-300">Treinamento operacional para a equipe EDW.</p>
                      {videoSource === 'drive' && (
                        <a href={`https://drive.google.com/file/d/${currentVideo.driveId}/view`} target="_blank" className="mt-4 inline-block text-xs bg-gray-700 px-3 py-1.5 rounded-lg">Problemas no vídeo? Clique aqui</a>
                      )}
                    </div>
                    
                    <div className="mt-8">
                      <h3 className="text-lg font-bold mb-4">Comentários ({comments.length})</h3>
                      <form onSubmit={handleAddComment} className="mb-6">
                        <textarea value={newComment} onChange={e => setNewComment(e.target.value)} placeholder="Escreva um comentário..." className="w-full bg-transparent border-b border-[#303030] outline-none text-sm py-2 resize-none"></textarea>
                        <button type="submit" className="mt-2 bg-blue-600 px-4 py-1.5 rounded-full text-xs font-bold">Postar</button>
                      </form>
                      <div className="space-y-6">
                        {comments.map(c => (
                          <div key={c.id} className="flex gap-3">
                            <div className="w-8 h-8 rounded-full bg-blue-900 flex items-center justify-center text-xs font-bold">{c.authorName[0]}</div>
                            <div>
                              <div className="flex gap-2 items-center"><span className="text-sm font-bold">{c.authorName}</span><span className="text-[10px] text-gray-500">{new Date(c.createdAt).toLocaleDateString()}</span></div>
                              <p className="text-sm text-gray-300 mt-1">{c.text}</p>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                  <div className="lg:w-80">
                    <h4 className="font-bold mb-4">Aulas do Módulo</h4>
                    <div className="space-y-3">
                      {VIDEOS.filter(v => v.category === currentVideo.category && v.id !== currentVideo.id).map(v => (
                        <div key={v.id} onClick={() => playVideo(v)} className="flex gap-2 cursor-pointer hover:bg-[#181818] p-1 rounded-lg">
                          <img src={v.thumb} className="w-24 aspect-video object-cover rounded" />
                          <span className="text-xs font-medium line-clamp-2">{v.title}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {currentView === 'admin' && isAdmin && (
                <div className="p-8 max-w-5xl mx-auto">
                  <h2 className="text-2xl font-bold mb-6">Gestão de Usuários</h2>
                  <div className="bg-[#181818] rounded-xl overflow-hidden border border-[#303030]">
                    <table className="w-full text-left text-sm">
                      <thead className="bg-[#222] text-gray-400">
                        <tr><th className="p-4">Nome</th><th className="p-4">E-mail</th><th className="p-4">Data</th></tr>
                      </thead>
                      <tbody className="divide-y divide-[#303030]">
                        {registeredUsers.map(u => (
                          <tr key={u.id} className="hover:bg-[#222]">
                            <td className="p-4">{u.name}</td><td className="p-4">{u.email}</td><td className="p-4">{new Date(u.createdAt).toLocaleDateString()}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </main>
          </div>

          {showAuthModal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
              <div className="bg-[#181818] p-8 rounded-2xl border border-[#303030] w-full max-w-md relative">
                <button onClick={() => setShowAuthModal(false)} className="absolute top-4 right-4 text-gray-400"><i className="fa-solid fa-xmark"></i></button>
                <h2 className="text-xl font-bold mb-6 text-center">{authMode === 'login' ? 'Login' : 'Criar Conta'}</h2>
                {authError && <div className="bg-red-900/20 text-red-500 p-3 rounded-lg mb-4 text-xs">{authError}</div>}
                <form onSubmit={authMode === 'login' ? handleLogin : handleRegister} className="space-y-4">
                  {authMode === 'register' && <input type="text" placeholder="Nome" required className="w-full bg-[#121212] border border-[#303030] p-3 rounded-lg outline-none text-sm" value={authName} onChange={e=>setAuthName(e.target.value)} />}
                  <input type="email" placeholder="E-mail" required className="w-full bg-[#121212] border border-[#303030] p-3 rounded-lg outline-none text-sm" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} />
                  <input type="password" placeholder="Senha (min. 6 dígitos)" required className="w-full bg-[#121212] border border-[#303030] p-3 rounded-lg outline-none text-sm" value={authPassword} onChange={e=>setAuthPassword(e.target.value)} />
                  <button type="submit" className="w-full bg-blue-600 py-3 rounded-lg font-bold">Confirmar</button>
                </form>
                <div className="mt-4 text-center text-xs text-gray-400">
                  {authMode === 'login' ? 
                    <p>Novo por aqui? <button onClick={()=>setAuthMode('register')} className="text-blue-400">Cadastre-se</button></p> : 
                    <p>Já tem conta? <button onClick={()=>setAuthMode('login')} className="text-blue-400">Faça login</button></p>
                  }
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
