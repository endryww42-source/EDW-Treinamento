<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDW Treinamentos - Gestão Master</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #303030; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-[#0f0f0f] text-gray-200">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- LINK DA SUA NOVA API ---
    const SHEETDB_API_URL = "https://sheetdb.io/api/v1/u96damks61dut";

    const VIDEOS = [
      { id: 1, title: "Aula FGTS V8", category: "FGTS", duration: "4:52", thumb: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=640", localVideo: "./assets/Aula FGTS V8.mp4", driveId: "1LvZ5VGF9NH7gUYrgcIFWNIb7Bx8BHjS8" },
      { id: 2, title: "Como Filtrar Dados das planilhas bagunçadas da V8", category: "Sistemas", duration: "12:13", thumb: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=640", localVideo: "./assets/Como Filtrar Dados das planilhas bagunçadas da V8.mp4", driveId: "19vRifEQXqrElPpAAdbJixIB0zvpum0Kn" },
      { id: 3, title: "Colocar Extensão manual", category: "Ferramentas", duration: "8:59", thumb: "./assets/img/colocar_extensao_manual.png", localVideo: "./assets/Colocar Extensão manual.mp4", driveId: "19lnhQSdCZoo0Uo0S3fx9l7mjlVp8E162" },
      { id: 4, title: "Digitação BMG Aumento de Margem", category: "Aumento de Margem", duration: "4:45", thumb: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=640", localVideo: "./assets/Digitação BMG Aumento de Margem.mp4", driveId: "1eoayq9v-zoyOkHnSNlSaJWAVpRAoI7-Q" },
      { id: 5, title: "Digitação BMG Aumento de Margem1", category: "Aumento de Margem", duration: "4:45", thumb: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=640", localVideo: "./assets/Digitação BMG Aumento de Margem1.mp4", driveId: "1OYVoPUG0BZLjPQlSDAEG5qYeb2RgeVIW" },
      { id: 6, title: "Digitação BRB", category: "Digitação", duration: "1:56", thumb: "https://images.unsplash.com/photo-1601597111158-2fceff292cdc?w=640", localVideo: "./assets/Digitação BRB.mp4", driveId: "1XrpG2BMqQyNVm0wJH4skHr7QESL9MFjS" },
      { id: 7, title: "Digitação FACTA Aumento de margem INSS", category: "Aumento de Margem", duration: "8:53", thumb: "https://images.unsplash.com/photo-1556740714-a8395b3bf30f?w=640", localVideo: "./assets/Digitação FACTA Aumento de margem INSS.mp4", driveId: "1v8H4RBaj2NDvrXQJbNZWhavhF_ODfN2_" },
      { id: 8, title: "Digitação FGTS Facta Financeira", category: "FGTS", duration: "6:23", thumb: "https://images.unsplash.com/photo-1579621970588-a35d0e7ab9b6?w=640", localVideo: "./assets/Digitação FGTS Facta Financeira.mp4", driveId: "1Wb3_b0P4P9EM_jtwGg3R6oug6EBDpVDY" },
      { id: 9, title: "Digitação Novo 360bank", category: "Digitação", duration: "3:20", thumb: "https://images.unsplash.com/photo-1616803140344-6682afb13cda?w=640", localVideo: "./assets/Digitação Novo 360bank.mp4", driveId: "1-2XcPk0ZZrjOcF16GMN5Oj_BCmVlEv9-" },
      { id: 10, title: "Digitação Portabilidade (REP LE) Facta Financeira", category: "Portabilidade", duration: "7:25", thumb: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=640", localVideo: "./assets/Digitação Portabilidade (REP LE) Facta Financeira.mp4", driveId: "1j8Ai53hbtzJIG_Zy_5e9PoC8rN9Fj82n" },
      { id: 11, title: "Usar as ferramentas de disparo whatsapp", category: "Ferramentas", duration: "5:43", thumb: "https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?w=640", localVideo: "./assets/Usar as ferramentas de disparo whatsapp.mp4", driveId: "1pd2PyBNanGWoLCIiRb3Px_WjTw8FR2RX" }
    ];

    function App() {
      const [currentView, setCurrentView] = useState("home");
      const [currentVideo, setCurrentVideo] = useState(null);
      const [videoSource, setVideoSource] = useState('drive');
      const [searchQuery, setSearchQuery] = useState("");
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authMode, setAuthMode] = useState('login');
      const [authEmail, setAuthEmail] = useState("");
      const [authPassword, setAuthPassword] = useState("");
      const [authName, setAuthName] = useState("");
      const [authError, setAuthError] = useState("");
      const [registeredUsers, setRegisteredUsers] = useState([]);
      const [editingUser, setEditingUser] = useState(null);
      const [newPassValue, setNewPassValue] = useState("");

      const loadUsers = async () => {
        try {
          const res = await fetch(`${SHEETDB_API_URL}?sheet=usuarios`);
          const data = await res.json();
          if (Array.isArray(data)) setRegisteredUsers(data);
        } catch (e) { console.error("SheetDB offline ou erro de link."); }
      };

      useEffect(() => { loadUsers(); }, []);

      const handleLogin = (e) => {
        e.preventDefault();
        const found = registeredUsers.find(u => u.email.toLowerCase() === authEmail.toLowerCase() && u.password === authPassword);
        if (found) {
          setUser(found);
          setIsAdmin(found.email.toLowerCase() === 'admin@edw.com');
          setShowAuthModal(false);
          setAuthError("");
        } else {
          setAuthError("E-mail ou senha não encontrados na base de dados.");
        }
      };

      const handleRegister = async (e) => {
        e.preventDefault();
        setAuthError("");
        const newUser = { 
            name: authName, 
            email: authEmail, 
            password: authPassword, 
            role: authEmail.toLowerCase() === 'admin@edw.com' ? 'admin' : 'user', 
            createdAt: new Date().toISOString() 
        };
        
        try {
          const res = await fetch(`${SHEETDB_API_URL}?sheet=usuarios`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: [newUser] })
          });
          if (res.ok) {
            setRegisteredUsers([...registeredUsers, newUser]);
            setUser(newUser);
            setIsAdmin(newUser.email.toLowerCase() === 'admin@edw.com');
            setShowAuthModal(false);
          } else {
            setAuthError("Erro de gravação. Certifique-se de que compartilhou a planilha com o e-mail do SheetDB.");
          }
        } catch (err) { setAuthError("Falha de conexão com a planilha."); }
      };

      const handleUpdatePassword = async () => {
        try {
          const res = await fetch(`${SHEETDB_API_URL}/email/${editingUser}?sheet=usuarios`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: { password: newPassValue } })
          });
          if (res.ok) {
            setRegisteredUsers(registeredUsers.map(u => u.email === editingUser ? { ...u, password: newPassValue } : u));
            setEditingUser(null);
          }
        } catch (e) {}
      };

      const handleDeleteUser = async (email) => {
        if (!confirm(`Remover permanentemente o acesso de ${email}?`)) return;
        try {
          const res = await fetch(`${SHEETDB_API_URL}/email/${email}?sheet=usuarios`, { method: 'DELETE' });
          if (res.ok) setRegisteredUsers(registeredUsers.filter(u => u.email !== email));
        } catch (e) {}
      };

      const filteredVideos = VIDEOS.filter(v => v.title.toLowerCase().includes(searchQuery.toLowerCase()));

      return (
        <div className="flex flex-col h-screen overflow-hidden font-sans">
          {/* HEADER */}
          <header className="flex items-center justify-between px-6 h-16 bg-[#0f0f0f] border-b border-[#222] sticky top-0 z-50">
            <div className="flex items-center gap-4 cursor-pointer" onClick={() => setCurrentView("home")}>
              <div className="bg-blue-600 p-2 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                <i className="fa-solid fa-graduation-cap text-white"></i>
              </div>
              <span className="text-xl font-bold">EDW <span className="font-light text-blue-400">Treinamentos</span></span>
            </div>
            
            <div className="flex-1 max-w-xl mx-8 hidden sm:block">
              <div className="flex items-center bg-[#181818] border border-[#333] rounded-full px-5 py-2 focus-within:border-blue-500/50 transition-all">
                <i className="fa-solid fa-magnifying-glass text-gray-500 mr-3"></i>
                <input type="text" placeholder="Pesquisar treinamento..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="bg-transparent outline-none w-full text-sm text-gray-200" />
              </div>
            </div>

            <div className="flex items-center gap-4">
              {user ? (
                <div className="flex items-center gap-3">
                  <div className="text-right hidden md:block">
                     <p className="text-[10px] text-gray-500 uppercase font-bold leading-none mb-1">Colaborador</p>
                     <p className="text-sm font-semibold text-blue-400 leading-none">{user.name.split(' ')[0]}</p>
                  </div>
                  {isAdmin && <button onClick={() => setCurrentView("admin")} className="w-9 h-9 flex items-center justify-center bg-zinc-800 rounded-lg border border-zinc-700 text-blue-500 hover:bg-zinc-700" title="Admin"><i className="fa-solid fa-gear"></i></button>}
                  <button onClick={() => {setUser(null); setIsAdmin(false); setCurrentView("home");}} className="w-9 h-9 flex items-center justify-center text-gray-500 hover:text-red-400 transition-colors"><i className="fa-solid fa-power-off"></i></button>
                </div>
              ) : (
                <button onClick={() => {setAuthMode('login'); setShowAuthModal(true);}} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full text-sm font-bold shadow-lg transition-all active:scale-95">Entrar</button>
              )}
            </div>
          </header>

          <main className="flex-1 overflow-y-auto bg-[#0a0a0a] p-6 lg:p-10">
            {currentView === 'home' && (
              <div className="max-w-7xl mx-auto animate-fade-in">
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-6 gap-y-10">
                  {filteredVideos.map(v => (
                    <div key={v.id} onClick={() => { if(!user) setShowAuthModal(true); else { setCurrentVideo(v); setCurrentView("video"); window.scrollTo(0,0); } }} className="cursor-pointer group">
                      <div className="relative aspect-video rounded-2xl overflow-hidden mb-4 border border-[#222] shadow-xl transition-all group-hover:border-blue-500/50 group-hover:scale-[1.02]">
                        <img src={v.thumb} className="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-opacity" />
                        <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40">
                           <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white"><i className="fa-solid fa-play ml-1"></i></div>
                        </div>
                        <div className="absolute bottom-2 right-2 px-2 py-1 bg-black/80 backdrop-blur-md rounded text-[10px] font-bold text-white border border-white/10 tracking-widest">{v.duration}</div>
                      </div>
                      <h3 className="text-[15px] font-bold text-gray-100 line-clamp-2 leading-snug group-hover:text-blue-400 transition-colors">{v.title}</h3>
                      <p className="text-[10px] text-gray-600 uppercase mt-1 font-bold tracking-widest">{v.category}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {currentView === 'video' && currentVideo && (
              <div className="max-w-[1200px] mx-auto animate-fade-in">
                <div className="flex items-center justify-between mb-6">
                  <button onClick={() => setCurrentView("home")} className="text-gray-500 hover:text-white flex items-center gap-2 text-sm font-medium transition-colors"><i className="fa-solid fa-arrow-left text-xs"></i> Voltar à Galeria</button>
                  <div className="flex gap-1 bg-[#181818] p-1 rounded-xl border border-[#222]">
                    <button onClick={() => setVideoSource('drive')} className={`px-4 py-1.5 text-[11px] font-bold rounded-lg transition-all ${videoSource === 'drive' ? 'bg-blue-600 text-white shadow-lg' : 'text-gray-500 hover:text-gray-300'}`}>Nuvem</button>
                    <button onClick={() => setVideoSource('local')} className={`px-4 py-1.5 text-[11px] font-bold rounded-lg transition-all ${videoSource === 'local' ? 'bg-blue-600 text-white shadow-lg' : 'text-gray-500 hover:text-gray-300'}`}>Local (PC)</button>
                  </div>
                </div>
                <div className="aspect-video bg-black rounded-3xl overflow-hidden border border-[#222] shadow-2xl">
                  {videoSource === 'drive' ? (
                    <iframe src={`https://drive.google.com/file/d/${currentVideo.driveId}/preview`} className="w-full h-full" allowFullScreen style={{border:'none'}}></iframe>
                  ) : (
                    <video controls autoPlay className="w-full h-full object-contain"><source src={currentVideo.localVideo} type="video/mp4" /></video>
                  )}
                </div>
                <h1 className="text-2xl font-bold text-white mt-8 tracking-tight">{currentVideo.title}</h1>
                <div className="mt-4 p-5 bg-[#141414] rounded-2xl border border-[#222] text-sm text-gray-400 flex items-center gap-3">
                   <i className="fa-solid fa-circle-check text-green-500"></i>
                   Sessão iniciada como <strong>{user.name}</strong>. Progresso sincronizado via Google Sheets API.
                </div>
              </div>
            )}

            {currentView === 'admin' && isAdmin && (
              <div className="max-w-6xl mx-auto animate-fade-in">
                <div className="flex items-center justify-between mb-10">
                  <h2 className="text-3xl font-bold text-white flex items-center gap-3"><i className="fa-solid fa-fingerprint text-blue-500"></i> Painel Master</h2>
                  <button onClick={loadUsers} className="w-11 h-11 rounded-2xl bg-[#181818] border border-[#222] flex items-center justify-center text-gray-400 hover:text-blue-400 transition-all active:scale-90 shadow-lg"><i className="fa-solid fa-rotate"></i></button>
                </div>
                <div className="bg-[#141414] rounded-[2rem] overflow-hidden border border-[#222] shadow-2xl">
                  <table className="w-full text-left text-sm">
                    <thead className="bg-[#0f0f0f] text-gray-500 uppercase text-[10px] tracking-[2px] font-black">
                      <tr><th className="px-8 py-6">Colaborador</th><th className="px-8 py-6">E-mail</th><th className="px-8 py-6">Senha</th><th className="px-8 py-6 text-center">Ações</th></tr>
                    </thead>
                    <tbody className="divide-y divide-[#222]">
                      {registeredUsers.map((u, i) => (
                        <tr key={i} className="hover:bg-[#181818] transition-colors group">
                          <td className="px-8 py-6 font-bold text-gray-100">{u.name}</td>
                          <td className="px-8 py-6 text-gray-400 font-medium">{u.email}</td>
                          <td className="px-8 py-6">
                            {editingUser === u.email ? (
                              <div className="flex gap-2 animate-fade-in">
                                <input type="text" value={newPassValue} onChange={e => setNewPassValue(e.target.value)} className="bg-black border border-blue-600 px-3 py-1 rounded text-white text-xs outline-none w-32" />
                                <button onClick={handleUpdatePassword} className="text-green-500 hover:scale-110 transition-transform"><i className="fa-solid fa-check"></i></button>
                                <button onClick={() => setEditingUser(null)} className="text-red-500 hover:scale-110 transition-transform"><i className="fa-solid fa-xmark"></i></button>
                              </div>
                            ) : (
                              <span className="bg-black/40 px-2 py-0.5 rounded font-mono text-[10px] border border-white/5">{u.password}</span>
                            )}
                          </td>
                          <td className="px-8 py-6 text-center flex justify-center gap-2">
                            <button onClick={() => {setEditingUser(u.email); setNewPassValue(u.password);}} className="w-9 h-9 rounded-xl bg-blue-600/10 text-blue-400 hover:bg-blue-600 hover:text-white transition-all shadow-sm"><i className="fa-solid fa-key text-xs"></i></button>
                            {u.email.toLowerCase() !== 'admin@edw.com' && (
                              <button onClick={() => handleDeleteUser(u.email)} className="w-9 h-9 rounded-xl bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition-all shadow-sm"><i className="fa-solid fa-trash-can text-xs"></i></button>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>

          {/* AUTH MODAL */}
          {showAuthModal && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-4 backdrop-blur-xl">
              <div className="bg-[#0f0f0f] p-10 rounded-[2.5rem] border border-[#222] w-full max-w-md relative shadow-2xl animate-fade-in">
                <button onClick={() => {setShowAuthModal(false); setAuthError("");}} className="absolute top-6 right-6 text-gray-500 hover:text-white transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
                <div className="text-center mb-10">
                   <div className="w-16 h-16 bg-blue-600 rounded-[1.5rem] flex items-center justify-center text-white text-2xl mx-auto mb-4 font-black shadow-2xl italic">E</div>
                   <h2 className="text-3xl font-black text-white">{authMode === 'login' ? 'Login EDW' : 'Acesso Equipe'}</h2>
                   <p className="text-gray-500 text-xs mt-2 uppercase tracking-widest font-bold">EDW Treinamentos Operacionais</p>
                </div>
                {authError && <div className="bg-red-500/10 border border-red-500/30 text-red-400 p-4 rounded-2xl mb-8 text-xs font-bold leading-relaxed shadow-lg">{authError}</div>}
                <form onSubmit={authMode === 'login' ? handleLogin : handleRegister} className="space-y-5">
                  {authMode === 'register' && <input type="text" placeholder="Nome Completo" required className="w-full bg-[#181818] border border-[#222] p-4 rounded-2xl outline-none text-sm focus:border-blue-500 focus:bg-[#1c1c1c] transition-all" value={authName} onChange={e=>setAuthName(e.target.value)} />}
                  <input type="email" placeholder="E-mail" required className="w-full bg-[#181818] border border-[#222] p-4 rounded-2xl outline-none text-sm focus:border-blue-500 focus:bg-[#1c1c1c] transition-all" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} />
                  <input type="password" placeholder="Senha" required className="w-full bg-[#181818] border border-[#222] p-4 rounded-2xl outline-none text-sm focus:border-blue-500 focus:bg-[#1c1c1c] transition-all" value={authPassword} onChange={e=>setAuthPassword(e.target.value)} />
                  <button type="submit" className="w-full bg-blue-600 py-4 rounded-2xl font-black text-sm hover:bg-blue-700 transition-all shadow-xl shadow-blue-900/20 active:scale-95 mt-4 uppercase tracking-widest">Acessar Sistema</button>
                </form>
                <div className="mt-10 text-center">
                   <button onClick={() => { setAuthMode(authMode === 'login' ? 'register' : 'login'); setAuthError(""); }} className="text-xs font-bold text-gray-600 hover:text-blue-400 transition-colors uppercase tracking-widest">
                     {authMode === 'login' ? 'Pedir acesso (Criar conta)' : 'Já tem acesso? Fazer login'}
                   </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
