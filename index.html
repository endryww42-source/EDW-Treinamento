<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDW Treinamentos - Painel Admin Planilha</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #303030; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-[#0f0f0f] text-white">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- CONFIGURAÇÃO DO GOOGLE SHEETS (SHEETDB) ---
    const SHEETDB_API_URL = "https://sheetdb.io/api/v1/mzcsl76f4vw3z";

    const CATEGORIES = ["Todos os Treinamentos", "Digitação", "FGTS", "Aumento de Margem", "Portabilidade", "Sistemas", "Ferramentas"];

    const VIDEOS = [
      { id: 1, title: "Aula FGTS V8", author: "Treinamento EDW", category: "FGTS", duration: "4:52", thumb: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Aula FGTS V8.mp4", driveId: "1LvZ5VGF9NH7gUYrgcIFWNIb7Bx8BHjS8" },
      { id: 2, title: "Como Filtrar Dados das planilhas bagunçadas da V8", author: "Treinamento EDW", category: "Sistemas", duration: "12:13", thumb: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Como Filtrar Dados das planilhas bagunçadas da V8.mp4", driveId: "19vRifEQXqrElPpAAdbJixIB0zvpum0Kn" },
      { id: 3, title: "Colocar Extensão manual", author: "Treinamento EDW", category: "Ferramentas", duration: "8:59", thumb: "./assets/img/colocar_extensao_manual.png", localVideo: "./assets/Colocar Extensão manual.mp4", driveId: "19lnhQSdCZoo0Uo0S3fx9l7mjlVp8E162" },
      { id: 4, title: "Digitação BMG Aumento de Margem", author: "Treinamento EDW", category: "Aumento de Margem", duration: "4:45", thumb: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação BMG Aumento de Margem.mp4", driveId: "1eoayq9v-zoyOkHnSNlSaJWAVpRAoI7-Q" },
      { id: 5, title: "Digitação BMG Aumento de Margem1", author: "Treinamento EDW", category: "Aumento de Margem", duration: "4:45", thumb: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação BMG Aumento de Margem1.mp4", driveId: "1OYVoPUG0BZLjPQlSDAEG5qYeb2RgeVIW" },
      { id: 6, title: "Digitação BRB", author: "Treinamento EDW", category: "Digitação", duration: "1:56", thumb: "https://images.unsplash.com/photo-1601597111158-2fceff292cdc?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação BRB.mp4", driveId: "1XrpG2BMqQyNVm0wJH4skHr7QESL9MFjS" },
      { id: 7, title: "Digitação FACTA Aumento de margem INSS", author: "Treinamento EDW", category: "Aumento de Margem", duration: "8:53", thumb: "https://images.unsplash.com/photo-1556740714-a8395b3bf30f?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação FACTA Aumento de margem INSS.mp4", driveId: "1v8H4RBaj2NDvrXQJbNZWhavhF_ODfN2_" },
      { id: 8, title: "Digitação FGTS Facta Financeira", author: "Treinamento EDW", category: "FGTS", duration: "6:23", thumb: "https://images.unsplash.com/photo-1579621970588-a35d0e7ab9b6?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação FGTS Facta Financeira.mp4", driveId: "1Wb3_b0P4P9EM_jtwGg3R6oug6EBDpVDY" },
      { id: 9, title: "Digitação Novo 360bank", author: "Treinamento EDW", category: "Digitação", duration: "3:20", thumb: "https://images.unsplash.com/photo-1616803140344-6682afb13cda?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação Novo 360bank.mp4", driveId: "1-2XcPk0ZZrjOcF16GMN5Oj_BCmVlEv9-" },
      { id: 10, title: "Digitação Portabilidade (REP LE) Facta Financeira", author: "Treinamento EDW", category: "Portabilidade", duration: "7:25", thumb: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Digitação Portabilidade (REP LE) Facta Financeira.mp4", driveId: "1j8Ai53hbtzJIG_Zy_5e9PoC8rN9Fj82n" },
      { id: 11, title: "Usar as ferramentas de disparo whatsapp", author: "Treinamento EDW", category: "Ferramentas", duration: "5:43", thumb: "https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=640&q=80", localVideo: "./assets/Usar as ferramentas de disparo whatsapp.mp4", driveId: "1pd2PyBNanGWoLCIiRb3Px_WjTw8FR2RX" }
    ];

    function SidebarItem({ iconClass, label, active, isOpen }) {
      if (!isOpen) return null;
      return (
        <div className={`flex items-center px-3 py-2.5 mx-2 rounded-lg cursor-pointer transition-colors ${
          active ? 'bg-blue-600/10 text-blue-400 font-medium' : 'hover:bg-[#272727] text-gray-300'
        }`}>
          <div className={`mr-3 w-5 text-center ${active ? 'text-blue-400' : 'text-gray-400'}`}>
            <i className={iconClass}></i>
          </div>
          <span className="text-sm truncate flex-1">{label}</span>
        </div>
      );
    }

    function VideoCard({ video }) {
      return (
        <div className="flex flex-col cursor-pointer group h-full">
          <div className="relative w-full aspect-video rounded-xl overflow-hidden mb-3 border border-[#303030] bg-[#1a1a1a]">
            <img src={video.thumb} alt={video.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300 opacity-90 group-hover:opacity-100" />
            <div className="absolute bottom-1.5 right-1.5 bg-black/80 text-white text-xs font-medium px-1.5 py-0.5 rounded backdrop-blur-sm">
              {video.duration}
            </div>
            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
              <div className="w-12 h-12 bg-blue-600/90 rounded-full flex items-center justify-center backdrop-blur-md shadow-lg">
                <i className="fa-solid fa-play text-white ml-1 text-lg"></i>
              </div>
            </div>
          </div>
          <div className="flex flex-col px-1">
            <h3 className="text-gray-100 text-[15px] font-semibold line-clamp-2 leading-snug group-hover:text-blue-400" title={video.title}>
              {video.title}
            </h3>
            <div className="text-gray-400 text-sm mt-1.5">
              <span className="bg-[#222] px-2 py-0.5 rounded text-xs border border-[#333]">{video.category}</span>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [activeCategory, setActiveCategory] = useState("Todos os Treinamentos");
      const [currentView, setCurrentView] = useState("home");
      const [currentVideo, setCurrentVideo] = useState(null);
      const [videoSource, setVideoSource] = useState('drive');
      const [searchQuery, setSearchQuery] = useState("");
      
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authMode, setAuthMode] = useState('login');
      const [authEmail, setAuthEmail] = useState("");
      const [authPassword, setAuthPassword] = useState("");
      const [authName, setAuthName] = useState("");
      const [authError, setAuthError] = useState("");
      
      const [comments, setComments] = useState([]);
      const [newComment, setNewComment] = useState("");
      const [registeredUsers, setRegisteredUsers] = useState([]);
      
      // Estado para o painel admin
      const [editingUser, setEditingUser] = useState(null);
      const [newPassValue, setNewPassValue] = useState("");

      // Carregar Usuários da Planilha
      const loadUsers = () => {
        fetch(`${SHEETDB_API_URL}?sheet=usuarios`)
          .then(res => res.json())
          .then(data => {
            if (Array.isArray(data)) setRegisteredUsers(data);
          })
          .catch(err => console.error("Erro ao carregar usuários:", err));
      };

      useEffect(() => {
        loadUsers();
      }, []);

      // Carregar Comentários ao abrir um vídeo
      useEffect(() => {
        if (currentView === 'video' && currentVideo) {
          fetch(`${SHEETDB_API_URL}?sheet=comentarios&videoId=${currentVideo.id}`)
            .then(res => res.json())
            .then(data => {
              if (Array.isArray(data)) setComments(data.reverse());
            })
            .catch(err => console.error("Erro ao carregar comentários:", err));
        }
      }, [currentView, currentVideo]);

      const playVideo = (video) => {
        setCurrentVideo(video);
        setCurrentView("video");
        setIsSidebarOpen(false);
        setVideoSource('drive');
        window.scrollTo(0, 0);
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError("");
        
        const found = registeredUsers.find(u => u.email === authEmail && u.password === authPassword);
        
        if (found) {
          setUser(found);
          setIsAdmin(found.email === 'admin@edw.com');
          setShowAuthModal(false);
        } else {
          setAuthError("E-mail ou senha incorretos.");
        }
      };

      const handleRegister = async (e) => {
        e.preventDefault();
        setAuthError("");

        const newUser = {
          name: authName,
          email: authEmail,
          password: authPassword,
          role: authEmail === 'admin@edw.com' ? 'admin' : 'user',
          createdAt: new Date().toISOString()
        };

        try {
          const response = await fetch(`${SHEETDB_API_URL}?sheet=usuarios`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: [newUser] })
          });
          
          if (response.ok) {
            setRegisteredUsers([...registeredUsers, newUser]);
            setUser(newUser);
            setIsAdmin(newUser.email === 'admin@edw.com');
            setShowAuthModal(false);
          } else {
            throw new Error();
          }
        } catch (err) {
          setAuthError("Erro ao salvar na planilha. Certifique-se de que o SheetDB tem acesso à planilha.");
        }
      };

      const handleAddComment = async (e) => {
        e.preventDefault();
        if (!user) { setShowAuthModal(true); return; }
        if (!newComment.trim()) return;

        const commentObj = {
          videoId: currentVideo.id,
          text: newComment,
          authorName: user.name,
          authorEmail: user.email,
          createdAt: new Date().toISOString()
        };

        try {
          await fetch(`${SHEETDB_API_URL}?sheet=comentarios`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: [commentObj] })
          });
          setComments([commentObj, ...comments]);
          setNewComment("");
        } catch (err) {
          console.error("Erro ao salvar comentário");
        }
      };

      // --- FUNÇÕES DO PAINEL ADMIN ---
      
      const handleDeleteUser = async (email) => {
        if (!confirm(`Tem certeza que deseja remover o usuário ${email}?`)) return;
        
        try {
          const res = await fetch(`${SHEETDB_API_URL}/email/${email}?sheet=usuarios`, {
            method: 'DELETE'
          });
          if (res.ok) {
            setRegisteredUsers(registeredUsers.filter(u => u.email !== email));
          }
        } catch (err) {
          console.error("Erro ao deletar");
        }
      };

      const handleUpdatePassword = async () => {
        if (!editingUser || !newPassValue) return;

        try {
          const res = await fetch(`${SHEETDB_API_URL}/email/${editingUser}?sheet=usuarios`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: { password: newPassValue } })
          });
          if (res.ok) {
            setRegisteredUsers(registeredUsers.map(u => u.email === editingUser ? { ...u, password: newPassValue } : u));
            setEditingUser(null);
            setNewPassValue("");
          }
        } catch (err) {
          console.error("Erro ao mudar senha");
        }
      };

      const filteredVideos = VIDEOS.filter(v => {
        const matchCat = activeCategory === "Todos os Treinamentos" || v.category === activeCategory;
        const matchSearch = v.title.toLowerCase().includes(searchQuery.toLowerCase());
        return matchCat && matchSearch;
      });

      return (
        <div className="flex flex-col h-screen overflow-hidden font-sans">
          <header className="flex items-center justify-between px-4 h-14 bg-[#0f0f0f] border-b border-[#303030] sticky top-0 z-50">
            <div className="flex items-center gap-4">
              <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-[#272727] rounded-full hidden sm:block"><i className="fa-solid fa-bars text-xl"></i></button>
              <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setCurrentView("home"); setIsSidebarOpen(true);}}>
                <div className="bg-blue-600 p-1.5 rounded-lg w-8 h-8 flex items-center justify-center"><i className="fa-solid fa-graduation-cap text-white text-sm"></i></div>
                <span className="text-xl font-bold">EDW <span className="font-light text-blue-400">Treinamentos</span></span>
              </div>
            </div>
            <div className="flex-1 max-w-xl mx-4 hidden sm:block">
              {currentView !== 'admin' && (
                <div className="flex items-center bg-[#121212] border border-[#303030] rounded-full px-4 py-1.5">
                  <i className="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
                  <input type="text" placeholder="Pesquisar..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="bg-transparent outline-none w-full text-sm" />
                </div>
              )}
            </div>
            <div>
              {user ? (
                <div className="flex items-center gap-3">
                  <span className="text-sm font-medium">{user.name}</span>
                  <button onClick={() => {setUser(null); setIsAdmin(false); setCurrentView("home");}} className="text-xs text-gray-400 hover:text-white">Sair</button>
                </div>
              ) : (
                <button onClick={() => {setAuthMode('login'); setShowAuthModal(true);}} className="bg-blue-600 px-4 py-1.5 rounded-full text-sm font-medium hover:bg-blue-700 transition-colors">Entrar</button>
              )}
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden">
            <aside className={`${isSidebarOpen ? 'w-64' : 'w-0'} bg-[#0f0f0f] transition-all duration-300 border-r border-[#303030] overflow-y-auto overflow-x-hidden`}>
              <div className="py-4 border-b border-[#303030]">
                <div onClick={() => {setCurrentView("home"); setActiveCategory("Todos os Treinamentos");}}><SidebarItem iconClass="fa-solid fa-house" label="Início" active={currentView === 'home' && activeCategory === "Todos os Treinamentos"} isOpen={true} /></div>
                {isAdmin && <div onClick={() => setCurrentView("admin")}><SidebarItem iconClass="fa-solid fa-users-gear" label="Painel Admin" active={currentView === 'admin'} isOpen={true} /></div>}
              </div>
              <div className="py-4">
                <h3 className="px-5 mb-2 text-xs font-semibold text-gray-500 uppercase tracking-widest">Módulos</h3>
                {CATEGORIES.map(cat => (
                  <div key={cat} onClick={() => {setActiveCategory(cat); setCurrentView("home");}}><SidebarItem iconClass="fa-solid fa-circle-play" label={cat} active={activeCategory === cat} isOpen={true} /></div>
                ))}
              </div>
            </aside>

            <main className="flex-1 overflow-y-auto bg-[#0a0a0a]">
              {currentView === 'home' && (
                <div className="p-6 max-w-7xl mx-auto">
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    {filteredVideos.map(v => (
                      <div key={v.id} onClick={() => playVideo(v)}><VideoCard video={v} /></div>
                    ))}
                  </div>
                </div>
              )}

              {currentView === 'video' && currentVideo && (
                <div className="flex flex-col lg:flex-row gap-6 p-6 max-w-[1600px] mx-auto">
                  <div className="flex-1">
                    <div className="flex gap-2 mb-3 bg-[#181818] p-1 rounded-lg w-fit border border-[#303030]">
                      <button onClick={() => setVideoSource('drive')} className={`px-4 py-1.5 text-xs rounded-md ${videoSource === 'drive' ? 'bg-blue-600' : 'text-gray-400'}`}>Nuvem (Google Drive)</button>
                      <button onClick={() => setVideoSource('local')} className={`px-4 py-1.5 text-xs rounded-md ${videoSource === 'local' ? 'bg-blue-600' : 'text-gray-400'}`}>Local (PC)</button>
                    </div>
                    <div className="aspect-video bg-black rounded-xl overflow-hidden border border-[#303030]">
                      {videoSource === 'drive' ? (
                        <iframe src={`https://drive.google.com/file/d/${currentVideo.driveId}/preview`} className="w-full h-full" allowFullScreen style={{border:'none'}}></iframe>
                      ) : (
                        <video controls autoPlay className="w-full h-full object-contain"><source src={currentVideo.localVideo} type="video/mp4" /></video>
                      )}
                    </div>
                    <h1 className="text-2xl font-bold mt-4">{currentVideo.title}</h1>
                    <div className="mt-4 p-4 bg-[#181818] rounded-xl border border-[#303030]">
                      <div className="flex items-center gap-4 text-sm text-gray-400 mb-2 font-medium">
                        <span>Duração: {currentVideo.duration}</span>
                      </div>
                      <p className="text-sm text-gray-300">Treinamento operacional para a equipe EDW. Dados salvos na planilha Google.</p>
                    </div>
                    
                    <div className="mt-8 border-t border-[#303030] pt-6">
                      <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                        <i className="fa-regular fa-comments"></i> Comentários ({comments.length})
                      </h3>
                      <form onSubmit={handleAddComment} className="mb-6">
                        <textarea value={newComment} onChange={e => setNewComment(e.target.value)} placeholder="Escreva um comentário..." className="w-full bg-transparent border-b border-[#303030] outline-none text-sm py-2 resize-none focus:border-blue-500 transition-colors"></textarea>
                        <button type="submit" className="mt-2 bg-blue-600 px-6 py-2 rounded-full text-xs font-bold hover:bg-blue-700">Postar</button>
                      </form>
                      <div className="space-y-6">
                        {comments.map((c, i) => (
                          <div key={i} className="flex gap-3">
                            <div className="w-9 h-9 rounded-full bg-blue-900 flex items-center justify-center text-xs font-bold border border-blue-400/30">{c.authorName ? c.authorName[0].toUpperCase() : '?'}</div>
                            <div className="flex-1">
                              <div className="flex gap-2 items-center"><span className="text-sm font-bold">{c.authorName}</span><span className="text-[10px] text-gray-500">{new Date(c.createdAt).toLocaleDateString()}</span></div>
                              <p className="text-sm text-gray-300 mt-1">{c.text}</p>
                            </div>
                          </div>
                        ))}
                        {comments.length === 0 && <p className="text-sm text-gray-500 italic">Seja o primeiro a comentar!</p>}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {currentView === 'admin' && isAdmin && (
                <div className="p-8 max-w-6xl mx-auto">
                  <div className="flex items-center justify-between mb-8">
                    <h2 className="text-2xl font-bold flex items-center gap-2">
                      <i className="fa-solid fa-users-gear text-blue-500"></i> Gestão de Usuários
                    </h2>
                    <div className="text-xs text-gray-500 px-3 py-1 bg-[#181818] rounded-full border border-[#303030]">Total: {registeredUsers.length} usuários</div>
                  </div>

                  <div className="bg-[#181818] rounded-xl overflow-hidden border border-[#303030] shadow-xl">
                    <table className="w-full text-left text-sm">
                      <thead className="bg-[#121212] text-gray-400 uppercase text-[10px] tracking-widest font-bold">
                        <tr>
                          <th className="p-4">Nome</th>
                          <th className="p-4">E-mail</th>
                          <th className="p-4">Senha Atual</th>
                          <th className="p-4">Criado em</th>
                          <th className="p-4 text-center">Ações</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-[#303030]">
                        {registeredUsers.length === 0 && (
                          <tr><td colSpan="5" className="p-8 text-center text-gray-500 italic">Carregando usuários da planilha...</td></tr>
                        )}
                        {registeredUsers.map((u, i) => (
                          <tr key={i} className="hover:bg-[#222] transition-colors">
                            <td className="p-4 font-medium">{u.name}</td>
                            <td className="p-4 text-gray-400">{u.email}</td>
                            <td className="p-4 text-gray-500 font-mono text-xs">
                              {editingUser === u.email ? (
                                <div className="flex gap-2">
                                  <input 
                                    type="text" 
                                    value={newPassValue} 
                                    onChange={e => setNewPassValue(e.target.value)}
                                    placeholder="Nova senha"
                                    className="bg-[#0a0a0a] border border-blue-500 px-2 py-1 rounded text-white text-xs outline-none"
                                  />
                                  <button onClick={handleUpdatePassword} className="text-green-500 hover:text-green-400"><i className="fa-solid fa-check"></i></button>
                                  <button onClick={() => {setEditingUser(null); setNewPassValue("");}} className="text-red-500 hover:text-red-400"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                              ) : (
                                <span>{u.password}</span>
                              )}
                            </td>
                            <td className="p-4 text-gray-500">{new Date(u.createdAt).toLocaleDateString()}</td>
                            <td className="p-4 text-center flex justify-center gap-4">
                              <button 
                                onClick={() => {setEditingUser(u.email); setNewPassValue(u.password);}}
                                className="text-blue-400 hover:text-blue-300 transition-transform active:scale-90"
                                title="Mudar Senha"
                              >
                                <i className="fa-solid fa-key"></i>
                              </button>
                              
                              {u.email !== 'admin@edw.com' && (
                                <button 
                                  onClick={() => handleDeleteUser(u.email)}
                                  className="text-red-500 hover:text-red-400 transition-transform active:scale-90"
                                  title="Remover Usuário"
                                >
                                  <i className="fa-solid fa-trash-can"></i>
                                </button>
                              )}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </main>
          </div>

          {showAuthModal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4 backdrop-blur-md">
              <div className="bg-[#181818] p-8 rounded-2xl border border-[#303030] w-full max-w-md relative shadow-2xl">
                <button onClick={() => {setShowAuthModal(false); setAuthError("");}} className="absolute top-4 right-4 text-gray-400 hover:text-white"><i className="fa-solid fa-xmark text-lg"></i></button>
                <h2 className="text-2xl font-bold mb-6 text-center">{authMode === 'login' ? 'Acessar Treinamentos' : 'Criar Conta EDW'}</h2>
                {authError && <div className="bg-red-900/20 text-red-500 p-3 rounded-lg mb-4 text-xs border border-red-500/20">{authError}</div>}
                <form onSubmit={authMode === 'login' ? handleLogin : handleRegister} className="space-y-4">
                  {authMode === 'register' && <input type="text" placeholder="Seu Nome Completo" required className="w-full bg-[#121212] border border-[#303030] p-3 rounded-lg outline-none text-sm focus:border-blue-500 transition-colors" value={authName} onChange={e=>setAuthName(e.target.value)} />}
                  <input type="email" placeholder="E-mail Corporativo" required className="w-full bg-[#121212] border border-[#303030] p-3 rounded-lg outline-none text-sm focus:border-blue-500 transition-colors" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} />
                  <input type="password" placeholder="Senha" required className="w-full bg-[#121212] border border-[#303030] p-3 rounded-lg outline-none text-sm focus:border-blue-500 transition-colors" value={authPassword} onChange={e=>setAuthPassword(e.target.value)} />
                  <button type="submit" className="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-lg">Confirmar</button>
                </form>
                <div className="mt-6 text-center text-xs text-gray-500 border-t border-[#303030] pt-4">
                  {authMode === 'login' ? 
                    <p>Não tem acesso? <button onClick={()=>setAuthMode('register')} className="text-blue-400 font-medium">Cadastre-se aqui</button></p> : 
                    <p>Já possui conta? <button onClick={()=>setAuthMode('login')} className="text-blue-400 font-medium">Faça login</button></p>
                  }
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
